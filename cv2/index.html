<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Thomas Hetland</title>
    <link rel="stylesheet" href="../projects/StarCitizenTracker/color-config.css">
    <style>
        /* ===== 3-COLOR SYSTEM ===== */
        :root {
            --color-light: #aba9a2;
            --color-dark: #18140c;
            --accent-color: #d05252;
            --cv2-shadow-blur: 1.5px;
            --cv2-shadow-text-blur: 3px;
            --cv2-shadow-text-opacity: 1;
            --cv2-shadow-offset-x: 3.5px;
            --cv2-shadow-offset-y: 5px;

            --primary-color: var(--color-light);
            --secondary-color: var(--color-dark);
        }

        body.dark-mode {
            --primary-color: var(--color-dark);
            --secondary-color: var(--color-light);
        }

        /* ===== RESET ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 12px; height: 12px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--secondary-color); border: 2px solid var(--primary-color); }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); border-color: var(--secondary-color); }
        * { scrollbar-width: thin; scrollbar-color: var(--secondary-color) var(--primary-color); }

        body {
            font-family: Arial, sans-serif;
            background: var(--primary-color);
            color: var(--secondary-color);
            min-height: 100vh;
            padding: 50px;
            line-height: 1.6;
            position: relative;
            transition: background-color 0.3s, color 0.3s;
        }

        #cv2RenderRoot {
            position: relative;
            z-index: 2;
        }
        #cv2ShadowLayer {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.3;
            filter: blur(var(--cv2-shadow-blur));
        }
        #cv2NavShadowLayer {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.3;
            filter: blur(var(--cv2-shadow-blur));
        }
        #cv2ShadowLayer > * {
            pointer-events: none;
        }
        #cv2NavShadowLayer > * {
            pointer-events: none;
        }
        #cv2ShadowLayer .top-nav-button,
        #cv2NavShadowLayer .top-nav-button,
        #cv2ShadowLayer .cv-tag,
        #cv2ShadowLayer .cv-name,
        #cv2ShadowLayer .cv-subtitle,
        #cv2ShadowLayer .cv-section-title,
        #cv2ShadowLayer .cv-sidebar-title,
        #cv2ShadowLayer .cv-field-date,
        #cv2ShadowLayer .cv-field-title,
        #cv2ShadowLayer .cv-field-org,
        #cv2ShadowLayer .cv-field-desc,
        #cv2ShadowLayer .cv-project-name,
        #cv2ShadowLayer .cv-project-date,
        #cv2ShadowLayer .cv-project-desc,
        #cv2ShadowLayer .cv-info-label,
        #cv2ShadowLayer .cv-info-value,
        #cv2ShadowLayer .cv-skill-tag,
        #cv2ShadowLayer .placeholder-text,
        #cv2ShadowLayer .btn-icon,
        #cv2ShadowLayer .cv-popup-title,
        #cv2ShadowLayer .cv-popup-date,
        #cv2ShadowLayer .cv-popup-desc,
        #cv2ShadowLayer .cv-popup-close,
        #cv2ShadowLayer .cv-topbar-left,
        #cv2ShadowLayer a {
            filter: blur(var(--cv2-shadow-text-blur));
            opacity: var(--cv2-shadow-text-opacity);
        }
        #cv2ShadowLayer .main-container,
        #cv2ShadowLayer .cv-topbar,
        #cv2ShadowLayer .cv-header,
        #cv2ShadowLayer .cv-section,
        #cv2ShadowLayer .cv-sidebar-block,
        #cv2ShadowLayer .cv-photo,
        #cv2ShadowLayer .top-nav-button,
        #cv2ShadowLayer .btn-icon,
        #cv2ShadowLayer .cv-popup,
        #cv2ShadowLayer .cv-popup-image,
        #cv2ShadowLayer .cv-popup-details {
            background: transparent !important;
        }

        a { color: var(--secondary-color); text-decoration: none; }
        a:hover,
        a.is-hovered { text-decoration: underline; }

        /* ===== TOP NAV ===== */
        .top-left-nav {
            position: fixed; top: 20px; left: 20px;
            display: flex; gap: 20px; z-index: 1000;
        }
        .top-nav-button {
            background: transparent;
            border: 2px solid var(--secondary-color);
            padding: 12px 20px;
            font-size: 0.7rem; font-weight: bold;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--secondary-color);
            cursor: pointer; transition: all 0.2s;
            font-family: inherit;
        }
        .top-nav-button:hover,
        .top-nav-button.is-hovered {
            background: var(--secondary-color);
            color: var(--primary-color);
        }

        /* ===== MAIN CONTAINER ===== */
        .main-container {
            max-width: 1200px; margin: 0 auto;
            background: transparent;
            border: 2px solid var(--secondary-color);
            padding: 40px;
            display: flex; flex-direction: column;
            gap: 40px;
        }

        /* ===== TOP BAR (nav-like) ===== */
        .cv-topbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0; border: 2px solid var(--secondary-color);
        }
        .cv-topbar-left {
            display: flex; align-items: center; gap: 8px;
            flex-wrap: wrap;
        }
        .cv-tag {
            padding: 8px 15px;
            border: 2px solid var(--secondary-color);
            background: transparent;
            color: var(--secondary-color);
            font-size: 0.7rem; letter-spacing: 2px;
            text-transform: uppercase; font-weight: bold;
            transition: all 0.2s;
        }
        .cv-tag:hover,
        .cv-tag.is-hovered {
            background: var(--secondary-color);
            color: var(--primary-color);
        }
        .cv-tag.accent {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        .cv-tag.accent:hover,
        .cv-tag.accent.is-hovered {
            background: var(--accent-color);
            color: var(--primary-color);
        }
        .cv-topbar-actions {
            display: flex; align-items: center; gap: 15px;
        }
        .btn-icon {
            background: transparent;
            border: 2px solid var(--secondary-color);
            padding: 10px; cursor: pointer;
            transition: all 0.2s;
            color: var(--secondary-color);
            display: flex; align-items: center; justify-content: center;
            font-family: inherit;
        }
        .btn-icon:hover,
        .btn-icon.is-hovered {
            background: var(--secondary-color);
            color: var(--primary-color);
        }
        .btn-icon.is-active {
            background: var(--secondary-color);
            color: var(--primary-color);
        }

        /* ===== HEADER (inside left column) ===== */
        .cv-header {
            padding: 30px 30px;
            background: transparent;
            border: 2px solid var(--secondary-color);
        }
        .cv-name {
            display: block;
            width: 100%;
            padding: 8px 14px;
            font-size: 2.4em; font-weight: bold;
            letter-spacing: 4px;
            color: var(--primary-color);
            background: var(--secondary-color);
            margin-bottom: 12px;
        }
        .cv-subtitle {
            display: block;
            font-size: 1em; letter-spacing: 2px;
            color: var(--secondary-color);
        }

        /* ===== TWO-COLUMN BODY ===== */
        .cv-body {
            display: flex;
            gap: 40px;
        }
        .cv-main {
            flex: 1; min-width: 0;
            display: flex; flex-direction: column;
            gap: 40px;
        }
        .cv-sidebar {
            width: 300px; flex-shrink: 0;
            display: flex; flex-direction: column;
            gap: 40px;
        }

        /* ===== SECTION ===== */
        .cv-section {
            border: 2px solid var(--secondary-color);
        }
        .cv-section-title {
            padding: 15px 30px;
            font-size: 0.8rem; font-weight: bold;
            letter-spacing: 3px; text-transform: uppercase;
            color: var(--primary-color);
            border-bottom: 2px solid var(--secondary-color);
            background: var(--secondary-color);
        }

        /* ===== TIMELINE FIELD ===== */
        .cv-field {
            padding: 30px 30px;
            border-bottom: 2px solid var(--secondary-color);
            position: relative;
            transition: all 0.2s;
        }
        .cv-field:last-child {
            border-bottom: none;
        }
        .cv-field:hover,
        .cv-field.is-hovered {
            background: color-mix(in srgb, var(--secondary-color) 5%, transparent);
        }

        .cv-field-date {
            position: absolute;
            top: 16px;
            right: 24px;
            font-size: 0.7rem; font-weight: bold;
            letter-spacing: 3px; text-transform: uppercase;
            color: var(--secondary-color);
            margin-bottom: 0;
            text-align: right;
        }

        .cv-field-logo {
            max-width: 140px; margin-bottom: 16px;
        }
        .cv-field-logo img {
            width: 100%; height: auto;
            transition: none;
        }
        .cv-field-logo .placeholder-icon {
            font-size: 0.7rem; font-weight: bold;
            letter-spacing: 2px; text-transform: uppercase;
            padding: 10px 16px;
            border: 2px solid var(--secondary-color);
            display: inline-block;
            color: var(--secondary-color);
        }

        .cv-field-title {
            font-size: 1.2em; font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .cv-field-org {
            font-size: 0.85em;
            letter-spacing: 1px;
            color: var(--secondary-color);
            margin-bottom: 12px;
        }
        .cv-field-desc {
            font-size: 0.9em; line-height: 1.8;
            color: var(--secondary-color);
        }

        /* ===== PROJECT MODULE ===== */
        .cv-project {
            display: flex; gap: 0;
            margin-top: 0;
            border: 2px solid var(--secondary-color);
            cursor: pointer;
            transition: all 0.2s;
        }
        .cv-field-desc + .cv-project {
            margin-top: 24px;
        }
        .cv-project + .cv-project {
            margin-top: 24px;
        }
        .cv-project:hover,
        .cv-project.is-hovered {
            background: var(--secondary-color);
            color: var(--primary-color);
        }
        .cv-project:hover .cv-project-name,
        .cv-project.is-hovered .cv-project-name {
            color: var(--accent-color);
        }
        .cv-project:hover .cv-project-date,
        .cv-project.is-hovered .cv-project-date {
            color: var(--primary-color);
        }

        .cv-project-thumb {
            width: 120px; flex-shrink: 0;
            background: transparent;
            display: flex; align-items: center; justify-content: center;
            border-right: 2px solid var(--secondary-color);
            overflow: hidden;
        }
        .cv-project-thumb img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .cv-project-thumb .placeholder-text {
            font-size: 0.6rem; font-weight: bold;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--secondary-color);
        }

        .cv-project-info {
            flex: 1; padding: 16px 20px; min-width: 0;
        }
        .cv-project-name {
            font-size: 0.95em; font-weight: bold;
            letter-spacing: 2px; margin-bottom: 4px;
        }
        .cv-project-date {
            font-size: 0.7rem; font-weight: bold;
            letter-spacing: 2px;
            color: var(--secondary-color);
            margin-bottom: 6px; display: block;
        }
        .cv-project-desc {
            font-size: 0.82em; line-height: 1.6;
            color: inherit;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }

        /* ===== SIDEBAR BLOCKS ===== */
        .cv-sidebar-block {
            border: 2px solid var(--secondary-color);
        }
        .cv-sidebar-title {
            padding: 15px 25px;
            font-size: 0.7rem; font-weight: bold;
            letter-spacing: 3px; text-transform: uppercase;
            border-bottom: 2px solid var(--secondary-color);
            color: var(--secondary-color);
            background: transparent;
        }
        .cv-sidebar-content {
            padding: 25px;
        }

        /* Photo */
        .cv-photo {
            width: 100%; aspect-ratio: 1;
            background: transparent;
            border: 2px solid var(--secondary-color);
            display: flex; align-items: center; justify-content: center;
            border-bottom: 2px solid var(--secondary-color);
            overflow: hidden;
        }
        .cv-photo img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .cv-photo .placeholder-text {
            font-size: 0.8rem; font-weight: bold;
            letter-spacing: 3px; text-transform: uppercase;
            color: var(--secondary-color);
        }

        /* Info list */
        .cv-info-list {
            list-style: none;
            display: flex; flex-direction: column;
            gap: 8px;
            padding: 0; margin: 0;
        }
        .cv-info-list li {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            min-height: 58px;
            padding: 10px 14px;
            border: 2px solid var(--secondary-color);
            gap: 4px;
        }
        .cv-info-label {
            font-size: 0.6rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--secondary-color);
            opacity: 0.5;
        }
        .cv-info-value {
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1.4;
        }

        /* Skills */
        .cv-skills {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .cv-skill-tag {
            display: flex;
            align-items: center;
            width: 100%;
            min-height: 42px;
            padding: 10px 14px;
            font-size: 0.7rem; font-weight: bold;
            letter-spacing: 2px; text-transform: uppercase;
            border: 2px solid var(--secondary-color);
            transition: all 0.2s;
        }
        .cv-skill-tag:hover,
        .cv-skill-tag.is-hovered {
            background: var(--secondary-color);
            color: var(--primary-color);
        }

        /* ===== POPUP ===== */
        .cv-popup-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 2000; display: flex;
            align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            transition: opacity 0.2s, backdrop-filter 0.2s;
        }
        .cv-popup-overlay.active {
            opacity: 1; pointer-events: auto;
        }
        .cv-popup {
            background: transparent;
            border: 2px solid var(--secondary-color);
            max-width: 1120px; width: 96%;
            max-height: 92vh; overflow-y: auto;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.2s;
        }
        .cv-popup-overlay.active .cv-popup {
            transform: translateY(0);
        }
        .cv-popup-close {
            position: absolute; top: 15px; right: 15px;
            width: 36px; height: 36px;
            background: transparent;
            border: 2px solid var(--secondary-color);
            color: var(--secondary-color);
            font-size: 0.8rem; font-weight: bold;
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: all 0.2s; z-index: 2;
            font-family: inherit;
        }
        .cv-popup-close:hover,
        .cv-popup-close.is-hovered {
            background: var(--secondary-color);
            color: var(--primary-color);
        }

        .cv-popup-content {
            display: flex; gap: 0;
            min-height: 560px;
        }
        .cv-popup-image {
            flex: 1.4; min-width: 0; min-height: 460px;
            background: transparent;
            display: flex; align-items: center; justify-content: center;
            border-right: 2px solid var(--secondary-color);
        }
        .cv-popup-image img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .cv-popup-image .placeholder-text {
            font-size: 0.7rem; font-weight: bold;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--secondary-color);
        }
        .cv-popup-details {
            flex: 1; min-width: 0;
            padding: 40px; display: flex; flex-direction: column;
        }
        .cv-popup-org-logo {
            margin-bottom: 16px;
            max-width: 180px;
        }
        .cv-popup-org-logo img {
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
        }
        .cv-popup-title {
            font-size: 1.4em; font-weight: bold;
            letter-spacing: 3px; text-transform: uppercase;
            margin-bottom: 8px;
        }
        .cv-popup-date {
            font-size: 0.75rem; font-weight: bold;
            letter-spacing: 2px;
            color: var(--secondary-color);
            margin-bottom: 20px;
        }
        .cv-popup-desc {
            font-size: 0.92em; line-height: 1.8;
            color: var(--secondary-color);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            body { padding: 30px; }
            .main-container { padding: 25px; gap: 25px; }
            .cv-body { flex-direction: column; gap: 25px; }
            .cv-sidebar { width: 100%; }
        }
        @media (max-width: 768px) {
            body { padding: 15px; }
            .main-container { padding: 15px; gap: 15px; }
            .cv-header { padding: 20px; }
            .cv-name { font-size: 2em; letter-spacing: 2px; }
            .cv-section-title { padding: 12px 20px; }
            .cv-field { padding: 20px; }
            .cv-sidebar-content { padding: 15px; }
            .cv-project { flex-direction: column; }
            .cv-project-thumb { width: 100%; height: 140px; border-right: none; border-bottom: 2px solid var(--secondary-color); }
            .cv-popup-content { flex-direction: column; }
            .cv-popup-image { min-height: 200px; border-right: none; border-bottom: 2px solid var(--secondary-color); }
            .cv-popup-details { padding: 25px; }
            .cv-popup { width: 96%; }
            .cv-topbar { flex-direction: column; }
        }
        @media (max-width: 480px) {
            body { padding: 10px; }
            .cv-name { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <div id="cv2NavShadowLayer" aria-hidden="true"></div>
    <div id="cv2ShadowLayer" aria-hidden="true"></div>
    <div id="cv2RenderRoot">
    <!-- Top Left Navigation -->
    <div class="top-left-nav">
        <button class="top-nav-button" onclick="window.open('../', '_self')" title="Back to Home">HOME</button>
        <button class="top-nav-button" onclick="window.open('../cv/', '_self')" title="Ocean CV">CV1</button>
    </div>

    <!-- ===== POPUP (shared, filled by JS) ===== -->
    <div class="cv-popup-overlay" id="cvPopupOverlay" onclick="closeProjectPopup(event)">
        <div class="cv-popup">
            <button class="cv-popup-close" onclick="closeProjectPopup(event, true)" aria-label="Close">✕</button>
            <div class="cv-popup-content">
                <div class="cv-popup-image" id="popupImage">
                    <span class="placeholder-text">IMAGE</span>
                </div>
                <div class="cv-popup-details">
                    <div class="cv-popup-org-logo" id="popupOrgLogo"></div>
                    <h3 class="cv-popup-title" id="popupTitle"></h3>
                    <span class="cv-popup-date" id="popupDate"></span>
                    <p class="cv-popup-desc" id="popupDesc"></p>
                </div>
            </div>
        </div>
    </div>

    <div class="main-container">

        <!-- TOP BAR -->
        <div class="cv-topbar">
            <div class="cv-topbar-left" style="padding: 15px 25px; font-size: 0.8rem; font-weight: bold; letter-spacing: 3px; text-transform: uppercase;">
                CV - Portfolio
            </div>
            <div class="cv-topbar-actions" style="padding: 15px 25px;">
                <button class="btn-icon" id="glassToggle" title="Toggle Bottom Layer" aria-label="Toggle Bottom Layer" aria-pressed="true">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <circle cx="8.2" cy="11.0" r="3.6" opacity="0.95"></circle>
                        <circle cx="14.9" cy="8.2" r="2.4" opacity="0.75"></circle>
                        <circle cx="14.8" cy="15.2" r="3.2" opacity="0.85"></circle>
                    </svg>
                </button>
                <button class="btn-icon" id="darkModeToggle" title="Toggle Dark Mode">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </div>
        </div>

        <!-- TWO-COLUMN BODY -->
        <div class="cv-body">

            <!-- LEFT: MAIN CONTENT -->
            <div class="cv-main">

                <!-- HEADER (inside left column) -->
                <div class="cv-header">
                    <h1 class="cv-name" id="cv2Name"></h1>
                    <p class="cv-subtitle" id="cv2Role"></p>
                </div>

                <!-- SUMMARY -->
                <div class="cv-section">
                    <div class="cv-section-title">SUMMARY</div>
                    <div class="cv-field">
                        <p class="cv-field-desc" id="cv2Summary"></p>
                    </div>
                </div>

                <!-- EXPERIENCE -->
                <div class="cv-section">
                    <div class="cv-section-title">EXPERIENCE</div>
                    <div id="cv2ExperienceFields"></div>
                </div>

                <!-- EDUCATION -->
                <div class="cv-section">
                    <div class="cv-section-title">EDUCATION</div>
                    <div id="cv2EducationFields"></div>
                </div>

                <!-- PROJECTS -->
                <div class="cv-section">
                    <div class="cv-section-title">PROJECTS</div>
                    <div id="cv2ProjectGroups"></div>
                </div>

            </div><!-- /cv-main -->

            <!-- RIGHT: SIDEBAR -->
            <div class="cv-sidebar">

                <!-- PHOTO -->
                <div class="cv-photo" id="cv2Photo">
                    <span class="placeholder-text">PHOTO</span>
                </div>

                <!-- ABOUT ME -->
                <div class="cv-sidebar-block">
                    <div class="cv-sidebar-title">ABOUT ME</div>
                    <div class="cv-sidebar-content">
                        <ul class="cv-info-list" id="cv2AboutList"></ul>
                    </div>
                </div>

                <!-- SKILLS -->
                <div class="cv-sidebar-block">
                    <div class="cv-sidebar-title">SKILLS</div>
                    <div class="cv-sidebar-content">
                        <div class="cv-skills" id="cv2SkillsList"></div>
                    </div>
                </div>

            </div><!-- /cv-sidebar -->

        </div><!-- /cv-body -->

    </div><!-- /main-container -->
    </div><!-- /cv2RenderRoot -->

    <script src="../cv/cv.js"></script>
    <script src="../projects/StarCitizenTracker/color-config.js"></script>
    <script>
        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderCv2ProjectCards(projects, sectionLogo) {
            const sectionLogoSrc = escapeHtml((sectionLogo && sectionLogo.src) || '');
            const sectionLogoAlt = escapeHtml((sectionLogo && sectionLogo.alt) || '');
            return (projects || []).map((project) => {
                const title = escapeHtml(project.name);
                const date = escapeHtml(project.date);
                const summary = escapeHtml(project.summary);
                const popupDesc = escapeHtml(project.popupDescription || project.summary);
                const image = escapeHtml(project.image || '');
                return `
                    <div class="cv-project" onclick="openProjectPopup(this)"
                         data-title="${title}"
                         data-date="${date}"
                         data-desc="${popupDesc}"
                         data-img="${image}"
                         data-org-logo="${sectionLogoSrc}"
                         data-org-logo-alt="${sectionLogoAlt}">
                        <div class="cv-project-thumb">
                            <span class="placeholder-text">IMG</span>
                        </div>
                        <div class="cv-project-info">
                            <h4 class="cv-project-name">${title}</h4>
                            <span class="cv-project-date">${date}</span>
                            <p class="cv-project-desc">${summary}</p>
                        </div>
                    </div>`;
            }).join('');
        }

        function renderCv2Logo(logo) {
            if (!logo) {
                return '';
            }
            if (logo.src) {
                return `<img src="${escapeHtml(logo.src)}" alt="${escapeHtml(logo.alt || '')}">`;
            }
            if (logo.placeholder) {
                return `<span class="placeholder-icon">${escapeHtml(String(logo.placeholder).toUpperCase())}</span>`;
            }
            return '';
        }

        function renderCv2Field(item, combineTitleOrg) {
            const title = escapeHtml(item.title || '');
            const org = escapeHtml(item.org || '');
            const description = escapeHtml(item.description || '');
            const date = escapeHtml(item.date || '');
            const projectsHtml = renderCv2ProjectCards(item.projects || [], item.logo);
            const logoHtml = renderCv2Logo(item.logo);

            return `
                <div class="cv-field">
                    <div class="cv-field-date">${date}</div>
                    ${logoHtml ? `<div class="cv-field-logo">${logoHtml}</div>` : ''}
                    <h3 class="cv-field-title">${combineTitleOrg && org ? `${title} — ${org}` : title}</h3>
                    ${!combineTitleOrg && org ? `<p class="cv-field-org">${org}</p>` : ''}
                    <p class="cv-field-desc">${description}</p>
                    ${projectsHtml}
                </div>`;
        }

        function renderCv2FromData() {
            const data = window.CV_DATA;
            if (!data) {
                return;
            }

            document.getElementById('cv2Name').textContent = (data.profile && data.profile.name) || '';
            document.getElementById('cv2Role').textContent = (data.profile && data.profile.role) || '';
            document.getElementById('cv2Summary').textContent = data.summary || '';

            const photo = document.getElementById('cv2Photo');
            if (photo && data.profile && data.profile.photo && data.profile.photo.src) {
                photo.innerHTML = `<img src="${escapeHtml(data.profile.photo.src)}" alt="${escapeHtml(data.profile.photo.alt || '')}">`;
            }

            const aboutList = document.getElementById('cv2AboutList');
            if (aboutList) {
                aboutList.innerHTML = (data.about || []).map((item) => {
                    const label = escapeHtml(item.label || '');
                    const valueText = escapeHtml(item.value || '');
                    const valueHtml = item.href
                        ? `<a href="${escapeHtml(item.href)}"${item.target ? ` target="${escapeHtml(item.target)}" rel="noopener"` : ''}>${valueText}</a>`
                        : valueText;
                    return `<li><span class="cv-info-label">${label}</span><span class="cv-info-value">${valueHtml}</span></li>`;
                }).join('');
            }

            const skillsList = document.getElementById('cv2SkillsList');
            if (skillsList) {
                skillsList.innerHTML = (data.skills || []).map((skill) => `<span class="cv-skill-tag">${escapeHtml(skill)}</span>`).join('');
            }

            const experienceFields = document.getElementById('cv2ExperienceFields');
            if (experienceFields) {
                experienceFields.innerHTML = (data.experience || []).map((item) => renderCv2Field(item, true)).join('');
            }

            const educationFields = document.getElementById('cv2EducationFields');
            if (educationFields) {
                educationFields.innerHTML = (data.education || []).map((item) => renderCv2Field(item, false)).join('');
            }

            const projectGroups = document.getElementById('cv2ProjectGroups');
            if (projectGroups) {
                projectGroups.innerHTML = (data.projects || []).map((item) => renderCv2Field(item, false)).join('');
            }

            scheduleCv2ShadowSync();
        }

        let cv2ShadowSyncFrame = null;
        let cv2HoveredKeys = new Set();
    let cv2BottomLayerVisible = true;

        const cv2HoverSelector = [
            '.top-nav-button',
            '.cv-tag',
            '.btn-icon',
            '.cv-field',
            '.cv-project',
            '.cv-skill-tag',
            '.cv-popup-close',
            'a'
        ].join(', ');

        function stripIdsFromClone(root) {
            if (root.nodeType !== Node.ELEMENT_NODE) {
                return;
            }
            root.removeAttribute('id');
            root.removeAttribute('onclick');
            const descendants = root.querySelectorAll('[id], [onclick]');
            descendants.forEach((node) => {
                node.removeAttribute('id');
                node.removeAttribute('onclick');
            });
        }

        function assignCv2ShadowKeys(sourceRoot) {
            const sourceNodes = sourceRoot.querySelectorAll(cv2HoverSelector);
            sourceNodes.forEach((node, index) => {
                node.dataset.shadowKey = String(index);
            });
        }

        function applyCv2HoveredState() {
            const renderRoot = document.getElementById('cv2RenderRoot');
            const shadowLayer = document.getElementById('cv2ShadowLayer');
            const navShadowLayer = document.getElementById('cv2NavShadowLayer');
            if (!renderRoot || !shadowLayer || !navShadowLayer) {
                return;
            }

            renderRoot.querySelectorAll('.is-hovered').forEach((node) => {
                node.classList.remove('is-hovered');
            });
            shadowLayer.querySelectorAll('.is-hovered').forEach((node) => {
                node.classList.remove('is-hovered');
            });
            navShadowLayer.querySelectorAll('.is-hovered').forEach((node) => {
                node.classList.remove('is-hovered');
            });

            cv2HoveredKeys.forEach((key) => {
                const sourceNode = renderRoot.querySelector(`[data-shadow-key="${key}"]`);
                const cloneNode = shadowLayer.querySelector(`[data-shadow-key="${key}"]`) || navShadowLayer.querySelector(`[data-shadow-key="${key}"]`);
                if (sourceNode) {
                    sourceNode.classList.add('is-hovered');
                }
                if (cloneNode) {
                    cloneNode.classList.add('is-hovered');
                }
            });
        }

        function collectCv2HoverKeys(target, root) {
            const nextKeys = new Set();
            let current = target;
            while (current && current !== root) {
                if (current.matches && current.matches(cv2HoverSelector) && current.dataset.shadowKey) {
                    nextKeys.add(current.dataset.shadowKey);
                }
                current = current.parentElement;
            }
            return nextKeys;
        }

        function updateCv2HoveredKeys(nextKeys) {
            const hasChanged = nextKeys.size !== cv2HoveredKeys.size || [...nextKeys].some((key) => !cv2HoveredKeys.has(key));
            if (!hasChanged) {
                return;
            }
            cv2HoveredKeys = nextKeys;
            applyCv2HoveredState();
        }

        function setCv2BottomLayerVisible(visible) {
            cv2BottomLayerVisible = visible;
            const shadowLayer = document.getElementById('cv2ShadowLayer');
            const navShadowLayer = document.getElementById('cv2NavShadowLayer');
            const glassToggle = document.getElementById('glassToggle');

            if (shadowLayer) {
                shadowLayer.style.display = visible ? '' : 'none';
            }
            if (navShadowLayer) {
                navShadowLayer.style.display = visible ? '' : 'none';
            }
            if (glassToggle) {
                glassToggle.classList.toggle('is-active', visible);
                glassToggle.setAttribute('aria-pressed', visible ? 'true' : 'false');
                glassToggle.title = visible ? 'Hide Bottom Layer' : 'Show Bottom Layer';
            }
            if (visible) {
                scheduleCv2ShadowSync();
            }
        }

        function syncCv2ShadowLayer() {
            cv2ShadowSyncFrame = null;
            const renderRoot = document.getElementById('cv2RenderRoot');
            const shadowLayer = document.getElementById('cv2ShadowLayer');
            const navShadowLayer = document.getElementById('cv2NavShadowLayer');
            if (!renderRoot || !shadowLayer || !navShadowLayer) {
                return;
            }

            if (!cv2BottomLayerVisible) {
                return;
            }

            const rootStyle = getComputedStyle(document.documentElement);
            const offsetX = Number.parseFloat(rootStyle.getPropertyValue('--cv2-shadow-offset-x')) || 0;
            const offsetY = Number.parseFloat(rootStyle.getPropertyValue('--cv2-shadow-offset-y')) || 0;

            const rect = renderRoot.getBoundingClientRect();
            shadowLayer.style.top = `${window.scrollY + rect.top + offsetY}px`;
            shadowLayer.style.left = `${window.scrollX + rect.left + offsetX}px`;
            shadowLayer.style.width = `${rect.width}px`;
            shadowLayer.style.height = `${renderRoot.offsetHeight}px`;

            assignCv2ShadowKeys(renderRoot);

            const clone = renderRoot.cloneNode(true);
            stripIdsFromClone(clone);
            const navInClone = clone.querySelector('.top-left-nav');
            if (navInClone) {
                navInClone.remove();
            }
            clone.style.margin = '0';
            shadowLayer.innerHTML = '';
            shadowLayer.appendChild(clone);

            navShadowLayer.innerHTML = '';
            const sourceNav = renderRoot.querySelector('.top-left-nav');
            if (sourceNav) {
                const navRect = sourceNav.getBoundingClientRect();
                const navClone = sourceNav.cloneNode(true);
                stripIdsFromClone(navClone);
                navClone.style.position = 'fixed';
                navClone.style.top = `${navRect.top + offsetY}px`;
                navClone.style.left = `${navRect.left + offsetX}px`;
                navShadowLayer.appendChild(navClone);
            }

            applyCv2HoveredState();
        }

        function scheduleCv2ShadowSync() {
            if (cv2ShadowSyncFrame !== null) {
                return;
            }
            cv2ShadowSyncFrame = window.requestAnimationFrame(syncCv2ShadowLayer);
        }

        setCv2BottomLayerVisible(true);

        renderCv2FromData();

        const cv2RenderRoot = document.getElementById('cv2RenderRoot');
        if (cv2RenderRoot) {
            const cv2ShadowObserver = new MutationObserver(() => scheduleCv2ShadowSync());
            cv2ShadowObserver.observe(cv2RenderRoot, {
                childList: true,
                subtree: true,
                attributes: true,
                characterData: true
            });
            cv2RenderRoot.addEventListener('pointermove', (event) => {
                updateCv2HoveredKeys(collectCv2HoverKeys(event.target, cv2RenderRoot));
            });
            cv2RenderRoot.addEventListener('pointerleave', () => {
                updateCv2HoveredKeys(new Set());
            });
            window.addEventListener('scroll', scheduleCv2ShadowSync, { passive: true });
            window.addEventListener('resize', scheduleCv2ShadowSync);
            window.addEventListener('load', scheduleCv2ShadowSync);
        }

        /* ===== POPUP LOGIC ===== */
        function openProjectPopup(el) {
            const overlay = document.getElementById('cvPopupOverlay');
            document.getElementById('popupTitle').textContent = el.dataset.title || '';
            document.getElementById('popupDate').textContent = el.dataset.date || '';
            document.getElementById('popupDesc').textContent = el.dataset.desc || '';

            const popupOrgLogo = document.getElementById('popupOrgLogo');
            const sectionLogoImg = el.closest('.cv-field') ? el.closest('.cv-field').querySelector('.cv-field-logo img') : null;
            const orgLogoSrc = el.dataset.orgLogo || (sectionLogoImg ? sectionLogoImg.getAttribute('src') : '');
            const orgLogoAlt = el.dataset.orgLogoAlt || (sectionLogoImg ? sectionLogoImg.getAttribute('alt') : '');
            popupOrgLogo.innerHTML = '';
            if (orgLogoSrc) {
                const img = document.createElement('img');
                img.src = orgLogoSrc;
                img.alt = orgLogoAlt || 'Organization logo';
                popupOrgLogo.appendChild(img);
            }

            const popupImage = document.getElementById('popupImage');
            const imgSrc = el.dataset.img;
            if (imgSrc) {
                popupImage.innerHTML = '<img src="' + encodeURI(imgSrc) + '" alt="' + (el.dataset.title || '') + '">';
            } else {
                popupImage.innerHTML = '<span class="placeholder-text">IMAGE</span>';
            }

            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeProjectPopup(e, force) {
            const overlay = document.getElementById('cvPopupOverlay');
            if (force || e.target === overlay) {
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeProjectPopup(null, true);
        });

        /* ===== DARK MODE TOGGLE ===== */
        const darkModeToggle = document.getElementById('darkModeToggle');
        const glassToggle = document.getElementById('glassToggle');
        const savedMode = localStorage.getItem('cv2-dark-mode');
        if (savedMode === 'true') document.body.classList.add('dark-mode');

        if (glassToggle) {
            glassToggle.addEventListener('click', () => {
                setCv2BottomLayerVisible(!cv2BottomLayerVisible);
            });
        }

        darkModeToggle.addEventListener('click', (e) => {
            if (e.shiftKey) {
                toggleColorConfigurator();
                return;
            }
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('cv2-dark-mode', document.body.classList.contains('dark-mode'));
            scheduleCv2ShadowSync();
        });

        function setColorConfiguratorVisible(visible) {
            const menu = document.getElementById('colorConfigMenu');
            if (!menu) return;

            if (visible) {
                menu.classList.add('show');
                if (window.colorConfigMenu && typeof window.colorConfigMenu.loadCurrentColors === 'function') {
                    window.colorConfigMenu.loadCurrentColors();
                }
                return;
            }

            menu.classList.remove('show');
        }

        function toggleColorConfigurator() {
            const menu = document.getElementById('colorConfigMenu');
            if (!menu) return;
            const isVisible = menu.classList.contains('show') && menu.style.display !== 'none';
            setColorConfiguratorVisible(!isVisible);
        }

        // The imported StarCitizenTracker configurator starts with .show; hide it reliably after creation.
        setColorConfiguratorVisible(false);
        window.addEventListener('DOMContentLoaded', () => setColorConfiguratorVisible(false));
        window.setTimeout(() => setColorConfiguratorVisible(false), 0);
        window.setTimeout(() => setColorConfiguratorVisible(false), 120);

        // Shortcut handling comes from StarCitizenTracker color-config.js (Ctrl/Cmd+Shift+C).
    </script>
</body>
</html>
