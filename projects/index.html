<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — Thomas Hetland</title>
    <link rel="stylesheet" href="../services/cvLayout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles/cv3.css">
    <link rel="stylesheet" href="/projects/projects.css">
</head>
<body>

    <div id="cv3NavShadowLayer" aria-hidden="true"></div>
    <div id="cv3ShadowLayer" aria-hidden="true"></div>
    <div id="cv3RenderRoot">

    <!-- PAGE -->
    <div class="cv3-outer">

        <!-- NAV -->
        <nav class="cv3-nav">
            <div class="cv3-nav-left">THOMAS HETLAND <span style="opacity:0.5">/ ALL PROJECTS</span></div>
            <div class="cv3-nav-right">
                <a href="/" class="cv3-nav-back" id="cvpBackBtn" title="Back" aria-label="Back">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                </a>
                <button class="cv3-nav-toggle is-active" id="cv3GlassToggle" title="Show Shadow Layer" aria-label="Toggle shadow layer" aria-pressed="false">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <circle cx="8.2" cy="11.0" r="3.6" opacity="0.95"></circle>
                        <circle cx="14.9" cy="8.2" r="2.4" opacity="0.75"></circle>
                        <circle cx="14.8" cy="15.2" r="3.2" opacity="0.85"></circle>
                    </svg>
                </button>
                <button class="cv3-nav-toggle" id="cv3DarkToggle" aria-label="Toggle dark mode">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                </button>
            </div>
        </nav>

        <!-- BODY -->
        <div class="cv3-body">

            <!-- MAIN -->
            <main class="cv3-main" id="cvpMain"></main>

            <!-- SIDEBAR -->
            <aside class="cv3-sidebar">

                <!-- SEARCH -->
                <div class="cv3-sidebar-card">
                    <div class="cv3-sidebar-card-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <span class="cv3-sidebar-card-header-text">SEARCH</span>
                    </div>
                    <div class="cv3-sidebar-card-body">
                        <input type="text" class="cvp-search-input" id="cvpSearch" placeholder="Title, description, tags…">
                    </div>
                </div>

                <!-- FILTER BY COMPANY -->
                <div class="cv3-sidebar-card">
                    <div class="cv3-sidebar-card-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                        </svg>
                        <span class="cv3-sidebar-card-header-text">FILTER BY COMPANY</span>
                    </div>
                    <div class="cv3-sidebar-card-body">
                        <div class="cvp-filter-tags" id="cvpFilterCompany"></div>
                    </div>
                </div>

                <!-- FILTER BY TAG -->
                <div class="cv3-sidebar-card">
                    <div class="cv3-sidebar-card-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true">
                            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
                            <line x1="7" y1="7" x2="7.01" y2="7"/>
                        </svg>
                        <span class="cv3-sidebar-card-header-text">FILTER BY TAG</span>
                    </div>
                    <div class="cv3-sidebar-card-body">
                        <div class="cvp-filter-tags" id="cvpFilterTags"></div>
                    </div>
                </div>

                <!-- FILTER BY STATUS -->
                <div class="cv3-sidebar-card">
                    <div class="cv3-sidebar-card-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true">
                            <polyline points="9 11 12 14 22 4"/>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                        </svg>
                        <span class="cv3-sidebar-card-header-text">FILTER BY STATUS</span>
                    </div>
                    <div class="cv3-sidebar-card-body">
                        <div class="cvp-filter-tags" id="cvpFilterStatus"></div>
                        <button class="cvp-filter-clear" id="cvpFilterClear">Clear All Filters</button>
                    </div>
                </div>

            </aside>

        </div><!-- /cv3-body -->
    </div><!-- /cv3-outer -->

    </div><!-- /cv3RenderRoot -->

    <script src="../cv/cv.js"></script>
    <script src="./projects.js"></script>
    <script src="/services/dataEditor.js" defer></script>
    <script src="/services/projectEditor.js" defer></script>
    <script src="../services/cvLayout.js"></script>
    <script src="/services/projectGroups.js"></script>
    <script src="/projects/projectsView.js"></script>
</body>
</html>
