<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>CV - Thomas Hetland</title>
    <link rel="stylesheet" href="../projects/StarCitizenTracker/color-config.css">
    <link rel="stylesheet" href="../services/cvLayout.css">
    <link rel="stylesheet" href="../services/cvEditor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== COLOR SYSTEM ===== */
        :root {
            /* Base colors — overridable by the Color Configurator */
            --color-light:  #e0dcd9;
            --color-dark:   #151312;
            --accent-color: #fbc25b;

            /* CV2-compatible primary/secondary mapping */
            --primary-color:   var(--color-light);
            --secondary-color: var(--color-dark);

            /* CV3 semantic aliases derived from base colors */
            --bg:      var(--color-light);
            --surface: color-mix(in srgb, var(--color-light) 82%, white);
            --dark:    var(--color-dark);
            --text:    var(--color-dark);
            --muted:   color-mix(in srgb, var(--color-dark) 45%, var(--color-light));
            --border:  var(--color-dark);
            --strip-w: 52px;

            /* ===== SPACING SCALE (4px base) ===== */
            --sp-1:  4px;
            --sp-2:  8px;
            --sp-3:  12px;
            --sp-4:  16px;
            --sp-5:  20px;
            --sp-6:  24px;
            --sp-7:  32px;
            --sp-8:  40px;
        }
        body.dark-mode {
            --primary-color:   var(--color-dark);
            --secondary-color: var(--color-light);

            --bg:      var(--color-dark);
            --surface: color-mix(in srgb, var(--color-dark) 82%, black);
            --dark:    var(--color-light);
            --text:    var(--color-light);
            --muted:   color-mix(in srgb, var(--color-light) 45%, var(--color-dark));
            --border:  var(--color-light);
        }

        /* ===== RESET ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        a { color: inherit; text-decoration: none; }

        /* ===== BASE ===== */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: var(--sp-7);
        }

        /* ===== OUTER WRAPPER ===== */
        .cv3-outer {
            max-width: 1320px;
            margin: 0 auto;
            border: 2px solid var(--border);
            background: transparent;
            padding: var(--sp-7);
            display: flex;
            flex-direction: column;
            gap: var(--sp-7);
        }

        /* ===== NAV BAR ===== */
        .cv3-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--sp-4) 0 var(--sp-6);
            height: 68px;
            border: 2px solid var(--border);
        }
        .cv3-nav-left {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .cv3-nav-right {
            display: flex;
            align-items: center;
            gap: var(--sp-5);
        }
        .cv3-nav-menu {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: var(--sp-2);
            cursor: pointer;
        }
        .cv3-nav-toggle {
            width: 36px; height: 36px;
            border: 2px solid var(--border);
            background: var(--dark);
            color: var(--bg);
            font-size: 0.85rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s;
            text-decoration: none;
        }
        a.cv3-nav-toggle,
        a.cv3-nav-toggle:link,
        a.cv3-nav-toggle:visited {
            background: var(--bg);
            color: var(--dark);
            text-decoration: none;
        }
        a.cv3-nav-toggle:hover {
            background: var(--dark);
            color: var(--bg);
            opacity: 1;
        }
        .cv3-nav-toggle:hover,
        .cv3-nav-toggle.is-hovered { opacity: 0.7; }
        .cv3-nav-toggle.is-active {
            background: var(--bg);
            color: var(--dark);
        }



        /* ===== BODY: two-column ===== */
        .cv3-body {
            display: flex;
            align-items: flex-start;
        }

        /* ===== MAIN (left) ===== */
        .cv3-main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: var(--sp-7);
        }

        /* ===== SECTION WRAPPER — grid: strip column + content column ===== */
        .cv3-section {
            display: grid;
            grid-template-columns: var(--strip-w) 1fr;
            border: 2px solid var(--border);
            position: relative;
        }
        /* Solid dark fill for the entire strip column, full section height */
        .cv3-section::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            width: var(--strip-w);
            background: var(--dark);
            z-index: 0;
        }

        /* Everything in column 2 */
        .cv3-section > *:not(.cv3-strip),
        .cv3-fields > * {
            grid-column: 2;
        }

        /* Vertical strip — absolutely fills the dark left bar */
        .cv3-strip {
            position: absolute;
            top: 0; bottom: 0; left: 0;
            width: var(--strip-w);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: var(--sp-3) 0;
            color: var(--bg);
            z-index: 1;
        }
        .cv3-strip svg {
            width: 16px; height: 16px;
            flex-shrink: 0;
        }
        .cv3-strip-num {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--bg);
        }

        /* Per-field date cell (one per field, stacked under number) */
        .cv3-strip-date {
            flex-direction: column;
            gap: 2px;
            padding: var(--sp-3) 2px;
        }
        .cv3-strip-date span {
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.2;
            white-space: nowrap;
            color: var(--bg);
        }
        .cv3-strip-date-sep {
            width: 14px;
            height: 1px;
            background: color-mix(in srgb, var(--bg) 35%, transparent);
        }

        /* Section header bar (sits in column 2) */
        .cv3-section-header {
            display: flex;
            align-items: center;
            gap: var(--sp-3);
            padding: var(--sp-4) var(--sp-6);
            border-bottom: 2px solid var(--border);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .cv3-section-header svg {
            width: 15px; height: 15px;
            flex-shrink: 0;
        }
        .cv3-section-content {
            padding: var(--sp-6);
        }
        /* Wrapper that lets its children participate in the parent grid */
        .cv3-fields {
            display: contents;
        }
        /* Layout-wide button section */
        .cv3-section-button-wrap {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: var(--sp-3);
        }
        /* Button-only section: no strip, no header, no surrounding border */
        .cv3-section.cv3-section-button-only {
            display: block;
            border: none;
            grid-template-columns: none;
        }
        .cv3-section.cv3-section-button-only::before { display: none; }
        .cv3-section.cv3-section-button-only > * { grid-column: auto; }
        .cv3-section-button {
            display: block;
            width: 100%;
            padding: var(--sp-4) var(--sp-5);
            background: var(--dark);
            color: var(--bg);
            border: 2px solid var(--border);
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }
        .cv3-section-button:hover {
            background: var(--accent-color, var(--dark));
            color: var(--dark);
        }
        .cv3-section-button-edit {
            display: flex;
            flex-direction: column;
            gap: var(--sp-1);
            font-size: 0.7rem;
            color: var(--muted);
        }

        /* ===== HERO SECTION (01) ===== */
        .cv3-hero {
            position: relative;
            overflow: hidden;
            grid-row: 1 / -1; /* span all rows so strip cells don't add height */
        }
        .cv3-hero-dot-grid {
            position: absolute;
            top: 0; left: 0;
            width: 90px; height: 90px;
            background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
            background-size: 10px 10px;
            opacity: 0.25;
            pointer-events: none;
        }
        .cv3-hero-inner {
            position: relative;
            z-index: 2;
            padding: var(--sp-6);
            max-width: 100%;
        }
        .cv3-hero-role {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: var(--sp-2);
        }
        .cv3-hero-name {
            font-size: clamp(1.6rem, 3.5vw, 2.6rem);
            font-weight: 900;
            letter-spacing: -0.5px;
            line-height: 1.1;
            white-space: nowrap;
            margin-bottom: 0;
        }
        .cv3-hero-tagline {
            font-size: 0.86rem;
            color: var(--muted);
            line-height: 1.75;
            max-width: 380px;
            margin-bottom: var(--sp-6);
        }
        .cv3-hero-links {
            display: flex;
            gap: var(--sp-6);
            flex-wrap: wrap;
        }
        .cv3-hero-link {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: var(--sp-2);
            border-bottom: 1px solid var(--border);
            padding-bottom: var(--sp-1);
            transition: opacity 0.2s;
        }
        .cv3-hero-link:hover,
        .cv3-hero-link.is-hovered { opacity: 0.5; }

        /* Hero photo — absolute right, fades left edge */
        .cv3-hero-photo-wrap {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 42%;
            overflow: hidden;
        }
        .cv3-hero-photo-wrap img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: top center;
            filter: grayscale(100%);
            opacity: 0.6;
        }
        .cv3-hero-photo-fade {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, var(--surface) 0%, transparent 55%);
        }
        .cv3-hero-photo-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: color-mix(in srgb, var(--border) 6%, transparent);
            font-size: 0.62rem; letter-spacing: 2px; font-weight: 700;
            color: var(--muted);
        }

        /* ===== TIMELINE FIELDS ===== */
        .cv3-field {
            padding: var(--sp-6);
            border-bottom: 2px solid var(--border);
            position: relative;
        }
        .cv3-field:last-child { border-bottom: none; }

        .cv3-field-date {
            position: absolute;
            top: var(--sp-4);
            right: var(--sp-6);
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .cv3-field-content {
            min-width: 0;
        }
        .cv3-field-content {
            flex: 1; min-width: 0;
            padding: var(--sp-6) var(--sp-6);
        }
        .cv3-field-logo {
            max-width: 130px;
            margin-bottom: var(--sp-3);
        }
        .cv3-field-logo img {
            width: 100%; height: auto;
        }
        .cv3-field-logo-text {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--muted);
        }
            font-size: 0.62rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            border: 2px solid var(--border);
            padding: var(--sp-1) var(--sp-3);
            display: inline-block;
        }
        .cv3-field-title {
            font-size: 1rem; font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: var(--sp-1);
        }
        .cv3-field-title-role {
            opacity: 0.5;
            font-weight: 600;
        }
        .cv3-field-org {
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 0.5px;
            margin-bottom: var(--sp-3);
        }
        .cv3-field-desc {
            font-size: 0.85rem;
            line-height: 1.75;
            color: var(--text);
            margin-top: var(--sp-4);
        }

        /* ===== PROJECT CARDS ===== */
        .cv3-project {
            display: flex;
            margin-top: var(--sp-4);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        .cv3-project:hover,
        .cv3-project.is-hovered {
            background: var(--dark);
            color: var(--bg);
        }
        .cv3-project:hover .cv3-project-name,
        .cv3-project.is-hovered .cv3-project-name,
        .cv3-project:hover .cv3-project-date,
        .cv3-project.is-hovered .cv3-project-date,
        .cv3-project:hover .cv3-project-desc,
        .cv3-project.is-hovered .cv3-project-desc {
            color: var(--bg);
        }
        .cv3-project:hover .cv3-project-thumb,
        .cv3-project.is-hovered .cv3-project-thumb {
            background: transparent;
            border-right-color: var(--bg);
        }
        .cv3-project:hover .cv3-project-thumb-ph,
        .cv3-project.is-hovered .cv3-project-thumb-ph {
            color: var(--bg);
        }
        .cv3-project-thumb {
            width: 220px; height: 140px; flex-shrink: 0;
            border-right: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            background: color-mix(in srgb, var(--border) 5%, transparent);
        }
        .cv3-project-thumb img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .cv3-project-thumb-ph {
            font-size: 0.58rem; letter-spacing: 2px;
            font-weight: 700; color: var(--muted);
        }
        .cv3-project-info {
            flex: 1; padding: var(--sp-3) var(--sp-4);
        }
        .cv3-project-name {
            font-size: 0.84rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            margin-bottom: var(--sp-1);
        }
        .cv3-project-date {
            font-size: 0.66rem; font-weight: 700;
            letter-spacing: 1.5px; color: var(--muted);
            margin-bottom: var(--sp-2); display: block;
        }
        .cv3-project-desc {
            font-size: 0.78rem; line-height: 1.6;
            color: var(--text);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .cv3-project-tags {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: flex-end;
        }
        .cv3-project-tag {
            font-size: 0.5rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            padding: 1px 5px;
            border: 1px solid var(--border);
            white-space: nowrap;
            color: var(--text);
        }
        .cv3-project:hover .cv3-project-tag,
        .cv3-project.is-hovered .cv3-project-tag {
            border-color: var(--bg);
            color: var(--bg);
        }

        /* ===== SIDEBAR — flush to outer right, full height ===== */
        .cv3-sidebar {
            width: 330px;
            flex-shrink: 0;
            align-self: flex-start;
            display: flex;
            flex-direction: column;
            gap: var(--sp-7);
            padding-left: var(--sp-7);
        }

        /* Sidebar cards — each is its own bordered card */
        .cv3-sidebar-card {
            border: 2px solid var(--border);
        }

        /* Profile photo — square */
        .cv3-sidebar-photo {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border: 2px solid var(--border);
            flex-shrink: 0;
        }
        .cv3-sidebar-photo img {
            width: 100%; height: 100%;
            object-fit: cover; object-position: 65% top;
        }
        .cv3-sidebar-photo-ph {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: color-mix(in srgb, var(--border) 7%, transparent);
            font-size: 0.62rem; letter-spacing: 2px;
            font-weight: 700; color: var(--muted);
        }

        /* Sidebar cards */

        .cv3-sidebar-card-header {
            display: flex;
            align-items: center;
            gap: var(--sp-3);
            padding: var(--sp-4) var(--sp-6);
            font-size: 0.66rem; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase;
            border-bottom: 2px solid var(--border);
        }
        .cv3-sidebar-card-header svg {
            width: 16px; height: 16px;
            flex-shrink: 0;
        }

        .cv3-sidebar-card-body {
            padding: 24px;
        }

        /* About Me text */
        .cv3-about-text {
            font-size: 0.82rem;
            line-height: 2;
            color: var(--text);
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 7;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .cv3-read-more {
            font-size: 0.66rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            display: inline-flex; align-items: center; gap: var(--sp-2);
            border-bottom: 1px solid var(--border);
            padding-bottom: var(--sp-1);
            transition: opacity 0.2s;
        }
        .cv3-read-more:hover,
        .cv3-read-more.is-hovered { opacity: 0.5; }

        /* Contact & Info list */
        .cv3-info-list { list-style: none; }
        .cv3-info-item {
            display: flex;
            align-items: center;
            gap: var(--sp-4);
            padding: 18px 24px;
            margin: 0 -24px;
            border-bottom: 2px solid var(--border);
        }
        .cv3-info-item:first-child { padding-top: 0; }
        .cv3-info-item:last-child { border-bottom: none; padding-bottom: 0; }
        .cv3-info-icon {
            width: 32px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem; flex-shrink: 0;
        }
        .cv3-info-text { flex: 1; }
        .cv3-info-label {
            font-size: 0.58rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--muted);
            display: block; margin-bottom: 3px;
        }
        .cv3-info-value {
            font-size: 0.88rem; color: var(--text); font-weight: 500;
        }
        .cv3-info-value a {
            border-bottom: 1px solid color-mix(in srgb, var(--border) 40%, transparent);
            transition: border-color 0.15s;
        }
        .cv3-info-value a:hover {
            border-color: var(--border);
        }

        /* Skills */
        .cv3-skills {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .cv3-skill-tag {
            font-size: 0.62rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 8px 14px;
            border: 2px solid var(--border);
            transition: background 0.15s, color 0.15s;
        }
        .cv3-skill-tag:hover,
        .cv3-skill-tag.is-hovered {
            background: var(--dark);
            color: var(--bg);
        }

        /* ===== POPUP OVERLAY ===== */
        .cv3-popup-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: flex-start; justify-content: center;
            overflow-y: auto;
            padding: var(--sp-8) var(--sp-5);
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s;
        }
        .cv3-popup-overlay.active {
            opacity: 1; pointer-events: auto;
        }
        .cv3-popup {
            background: var(--surface);
            border: 2px solid var(--border);
            max-width: 1500px; width: 100%;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.25s;
            margin: auto;
        }
        .cv3-popup-overlay.active .cv3-popup {
            transform: translateY(0);
        }
        .cv3-popup-close {
            position: absolute; top: var(--sp-3); right: var(--sp-3);
            width: 32px; height: 32px;
            border: 2px solid var(--border);
            background: var(--dark);
            color: var(--bg);
            font-size: 0.8rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            z-index: 2; transition: opacity 0.2s;
        }
        .cv3-popup-close:hover,
        .cv3-popup-close.is-hovered { opacity: 0.7; }
        .cv3-popup-content {
            display: flex;
        }
        .cv3-popup-image {
            flex: 0 0 auto;
            width: auto;
            height: 600px;
            aspect-ratio: 16 / 9;
            border-right: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            background: color-mix(in srgb, var(--border) 5%, transparent);
            overflow: hidden;
        }
        .cv3-popup-image img {
            width: 100%; height: 100%; object-fit: contain;
        }
        .cv3-popup-image-ph {
            font-size: 0.62rem; letter-spacing: 2px;
            font-weight: 700; color: var(--muted);
        }
        .cv3-popup-details {
            flex: 1; padding: var(--sp-7);
        }
        .cv3-popup-org-logo {
            max-width: 140px; margin-bottom: var(--sp-4);
        }
        .cv3-popup-org-logo img {
            width: 100%; height: auto;
        }
        .cv3-popup-title {
            font-size: 1.3rem; font-weight: 900;
            letter-spacing: 0.5px; margin-bottom: 4px;
        }
        .cv3-popup-date {
            font-size: 0.68rem; font-weight: 700;
            letter-spacing: 2px; color: var(--muted);
            text-transform: uppercase;
            display: block; margin-bottom: var(--sp-4);
        }
        .cv3-popup-desc {
            font-size: 0.87rem; line-height: 1.8;
            color: var(--text);
        }
        .cv3-popup-link-btn {
            display: inline-block;
            margin-top: var(--sp-5);
            padding: var(--sp-3) var(--sp-5);
            background: var(--dark);
            color: var(--bg);
            border: 2px solid var(--border);
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-decoration: none;
            transition: opacity 0.2s, background 0.2s;
        }
        .cv3-popup-link-btn:hover,
        .cv3-popup-link-btn.is-hovered {
            background: var(--accent-color, var(--dark));
            color: var(--dark);
        }
        .cv3-project-link-edit {
            display: flex; flex-direction: column; gap: 4px;
            margin-top: var(--sp-3);
            font-size: 0.7rem; color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
        }
        .cv3-project-link-edit > span > span[data-edit-path] {
            color: var(--text);
        }
        .cv3-edit-bool {
            display: inline-block;
            padding: 1px 6px;
            border: 1px solid var(--border);
            font-weight: 800;
            cursor: pointer;
            user-select: none;
        }
        .cv3-edit-bool.is-on  { background: var(--accent-color, var(--dark)); color: var(--dark); }
        .cv3-edit-bool.is-off { background: var(--surface); color: var(--muted); }
        body.cv-edit-mode .cv3-project.cv3-project-cv-hidden {
            opacity: 0.45;
            outline: 2px dashed var(--muted);
            outline-offset: -4px;
        }
        .cv3-project-link-btn {
            position: absolute;
            right: var(--sp-3);
            bottom: var(--sp-3);
            padding: 6px 12px;
            background: var(--dark);
            color: var(--bg);
            border: 2px solid var(--border);
            font-size: 0.62rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
            z-index: 2;
        }
        .cv3-project-link-btn:hover,
        .cv3-project-link-btn.is-hovered {
            background: var(--accent-color, var(--dark));
            color: var(--dark);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 820px) {
            .cv3-body { flex-direction: column; }
            .cv3-sidebar { width: 100%; padding-left: 0; padding-top: var(--sp-6); }
            .cv3-main { gap: var(--sp-4); }
            .cv3-hero-inner { max-width: 100%; }
            .cv3-hero-photo-wrap { display: none; }
        }
        @media (max-width: 560px) {
            body { padding: var(--sp-4); }
            .cv3-outer { padding: var(--sp-4); }
            .cv3-field-date-col { width: 90px; }
            .cv3-hero-name { font-size: 2rem; }
            .cv3-popup-content { flex-direction: column; }
            .cv3-popup-image { flex: none; min-height: 260px; border-right: none; border-bottom: 2px solid var(--border); }
        }
    </style>
</head>
<body>

    <div id="cv3NavShadowLayer" aria-hidden="true"></div>
    <div id="cv3ShadowLayer" aria-hidden="true"></div>
    <div id="cv3RenderRoot">

    <!-- ===== POPUP ===== -->
    <div class="cv3-popup-overlay" id="cv3PopupOverlay">
        <div class="cv3-popup">
            <button class="cv3-popup-close" id="cv3PopupClose" aria-label="Close">
                <i class="fas fa-times"></i>
            </button>
            <div class="cv3-popup-content">
                <div class="cv3-popup-image" id="cv3PopupImage">
                    <span class="cv3-popup-image-ph">IMAGE</span>
                </div>
                <div class="cv3-popup-details">
                    <div class="cv3-popup-org-logo" id="cv3PopupOrgLogo"></div>
                    <h3 class="cv3-popup-title" id="cv3PopupTitle"></h3>
                    <span class="cv3-popup-date" id="cv3PopupDate"></span>
                    <p class="cv3-popup-desc" id="cv3PopupDesc"></p>
                    <a class="cv3-popup-link-btn" id="cv3PopupLink" target="_blank" rel="noopener noreferrer" style="display:none"></a>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== PAGE ===== -->
    <div class="cv3-outer">

        <!-- NAV -->
        <nav class="cv3-nav">
            <div class="cv3-nav-left" id="cv3NavLabel">THOMAS HETLAND <span style="opacity:0.5">/ CV-PORTFOLIO</span></div>
            <div class="cv3-nav-right">
                <a class="cv3-nav-toggle" href="../cvprojects/" title="Projects" aria-label="Projects">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="square" aria-hidden="true">
                        <line x1="4" y1="6" x2="20" y2="6"></line>
                        <line x1="4" y1="12" x2="20" y2="12"></line>
                        <line x1="4" y1="18" x2="20" y2="18"></line>
                    </svg>
                </a>
                <button class="cv3-nav-toggle is-active" id="cv3GlassToggle" title="Show Shadow Layer" aria-label="Toggle shadow layer" aria-pressed="false">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <circle cx="8.2" cy="11.0" r="3.6" opacity="0.95"></circle>
                        <circle cx="14.9" cy="8.2" r="2.4" opacity="0.75"></circle>
                        <circle cx="14.8" cy="15.2" r="3.2" opacity="0.85"></circle>
                    </svg>
                </button>
                <button class="cv3-nav-toggle" id="cv3DarkToggle" aria-label="Toggle dark mode">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </div>
        </nav>

        <!-- BODY -->
        <div class="cv3-body">

            <!-- ========== MAIN COLUMN ========== -->
            <main class="cv3-main" id="cv3Main">

                <!-- 01: HERO (always static) -->
                <section class="cv3-section" id="cv3-hero">
                    <div class="cv3-strip">
                        <svg viewBox="0 0 24 24" fill="currentColor" stroke="none" width="16" height="16" aria-hidden="true">
                            <circle cx="5" cy="5" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="19" cy="5" r="1.5"/>
                            <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
                            <circle cx="5" cy="19" r="1.5"/><circle cx="12" cy="19" r="1.5"/><circle cx="19" cy="19" r="1.5"/>
                        </svg>
                        <span class="cv3-strip-num">01</span>
                    </div>
                    <div class="cv3-hero">
                        <div class="cv3-hero-inner">
                            <p class="cv3-hero-role" id="cv3HeroRole"></p>
                            <h1 class="cv3-hero-name" id="cv3HeroName"></h1>
                        </div>
                    </div>
                </section>

                <!-- Sections 02+ are generated dynamically from CV_DATA.sections -->

            </main>

            <!-- ========== SIDEBAR ========== -->
            <aside class="cv3-sidebar">

                <!-- Profile photo -->
                <div class="cv3-sidebar-photo" id="cv3Photo">
                    <div class="cv3-sidebar-photo-ph">PHOTO</div>
                </div>

                <!-- Contact & Info -->
                <div class="cv3-sidebar-card">
                    <div class="cv3-sidebar-card-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> CONTACT &amp; INFO
                    </div>
                    <div class="cv3-sidebar-card-body">
                        <ul class="cv3-info-list" id="cv3ContactList"></ul>
                    </div>
                </div>

                <!-- Skills -->
                <div class="cv3-sidebar-card">
                    <div class="cv3-sidebar-card-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg> SKILLS
                    </div>
                    <div class="cv3-sidebar-card-body">
                        <div class="cv3-skills" id="cv3SkillsList"></div>
                    </div>
                </div>

            </aside>

        </div><!-- /cv3-body -->
    </div><!-- /cv3-outer -->

    </div><!-- /cv3RenderRoot -->

    <script src="cv.js"></script>
    <script>
        /* ===== HELPERS ===== */
        function escapeHtml(v) {
            return String(v ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        const _S  = (body) => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="1em" height="1em" aria-hidden="true">${body}</svg>`;
        const _SI = (body) => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true">${body}</svg>`;

        /* Strip icon lookup — add new keys here to support new icon types */
        const SECTION_ICONS = {
            'summary':    _SI('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/>'),
            'experience': _SI('<rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>'),
            'education':  _SI('<path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>'),
            'projects':   _SI('<polyline points="16,18 22,12 16,6"/><polyline points="8,6 2,12 8,18"/>'),
        };
        const ABOUT_ICONS = {
            'location':      _S('<path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>'),
            'phone':         _S('<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.1 6.1l.91-1.85a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>'),
            'email':         _S('<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>'),
            'date of birth': _S('<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>'),
            'language':      _S('<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>'),
            'social':        _S('<path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>')
        };

        function getAboutIcon(label) {
            return ABOUT_ICONS[(label || '').toLowerCase()] || _S('<circle cx="12" cy="12" r="10"/>');
        }

        function isLogoPath(src) {
            if (!src) return false;
            const s = String(src).trim();
            return s.includes('/') || /^https?:/i.test(s) || /^data:/i.test(s);
        }
        function renderLogo(logo) {
            if (!logo) return '';
            if (logo.src) {
                if (isLogoPath(logo.src)) {
                    return `<img src="${escapeHtml(logo.src)}" alt="${escapeHtml(logo.alt || '')}">`;
                }
                return `<span class="cv3-field-logo-text">${escapeHtml(logo.src)}</span>`;
            }
            if (logo.placeholder) {
                return `<span class="cv3-field-logo-placeholder">${escapeHtml(String(logo.placeholder).toUpperCase())}</span>`;
            }
            return '';
        }

        function renderProjects(projects, orgLogo, parentPath) {
            const isEdit = document.body.classList.contains('cv-edit-mode');
            const logoSrc = escapeHtml((orgLogo && orgLogo.src) || '');
            const logoAlt = escapeHtml((orgLogo && orgLogo.alt) || '');
            const items = (projects || []).map((p, i) => {
                const showOnCv = p.showOnCv !== false; // default true
                if (!isEdit && !showOnCv) return '';
                const basePath = `${parentPath}.projects.${i}`;
                const name     = escapeHtml(p.name || '');
                const date     = escapeHtml(p.date || '');
                const summary  = escapeHtml(p.summary || '');
                const popupDesc = escapeHtml(p.popupDescription || p.summary || '');
                const img      = escapeHtml(p.image || '');
                const linkLabel = escapeHtml((p.link && p.link.label) || '');
                const linkUrl   = escapeHtml((p.link && p.link.url) || '');
                const showOnCard = !!(p.link && p.link.showOnCard);
                const tags     = p.tags || [];
                const tagsHtml = `<div class="cv3-project-tags" data-edit-list="${basePath}.tags">${tags.map((t, ti) => `<span class="cv3-project-tag" data-edit-item="${basePath}.tags.${ti}"><span class="cv3-project-tag-text" data-edit-path="${basePath}.tags.${ti}">${escapeHtml(t)}</span></span>`).join('')}</div>`;
                const cardBtnHtml = (showOnCard && linkUrl)
                    ? `<a class="cv3-project-link-btn" href="${linkUrl}" target="_blank" rel="noopener noreferrer">${linkLabel || 'Visit project'}</a>`
                    : '';
                const hiddenClass = showOnCv ? '' : ' cv3-project-cv-hidden';
                return `<div class="cv3-project${hiddenClass}"
                             data-edit-item="${basePath}"
                             data-title="${name}"
                             data-date="${date}"
                             data-desc="${popupDesc}"
                             data-img="${img}"
                             data-tags="${escapeHtml(JSON.stringify(tags))}"
                             data-org-logo="${logoSrc}"
                             data-org-logo-alt="${logoAlt}"
                             data-link-label="${linkLabel}"
                             data-link-url="${linkUrl}">
                    <div class="cv3-project-thumb">
                        ${img
                            ? `<img src="${img}" alt="${name}">`
                            : `<span class="cv3-project-thumb-ph">IMG</span>`}
                        <span class="cv3-edit-thumb-path cv3-edit-only" data-edit-path="${basePath}.image" data-edit-type="image-src">${img || 'image path…'}</span>
                    </div>
                    <div class="cv3-project-info">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;">
                            <h4 class="cv3-project-name" style="margin-bottom:0;" data-edit-path="${basePath}.name">${name}</h4>
                            ${tagsHtml}
                        </div>
                        <span class="cv3-project-date" data-edit-path="${basePath}.date">${date}</span>
                        <p class="cv3-project-desc" data-edit-path="${basePath}.summary">${summary}</p>
                        <p class="cv3-project-popupdesc cv3-edit-only" data-edit-path="${basePath}.popupDescription" data-edit-type="multiline">${popupDesc}</p>
                        ${cardBtnHtml}
                        <div class="cv3-project-link-edit cv3-edit-only">
                            <span class="cv3-edit-link-toggle">Show in CV:
                                <span class="cv3-edit-bool ${showOnCv ? 'is-on' : 'is-off'}" data-edit-path="${basePath}.showOnCv" data-edit-type="bool">${showOnCv ? 'YES' : 'NO'}</span>
                            </span>
                            <span class="cv3-edit-link-label">Button label: <span data-edit-path="${basePath}.link.label">${linkLabel}</span></span>
                            <span class="cv3-edit-link-url">URL: <span data-edit-path="${basePath}.link.url">${linkUrl}</span></span>
                            <span class="cv3-edit-link-toggle">Show on card:
                                <span class="cv3-edit-bool ${showOnCard ? 'is-on' : 'is-off'}" data-edit-path="${basePath}.link.showOnCard" data-edit-type="bool">${showOnCard ? 'YES' : 'NO'}</span>
                            </span>
                        </div>
                    </div>
                </div>`;
            }).join('');
            return `<div class="cv3-projects-list" data-edit-list="${parentPath}.projects">${items}</div>`;
        }

        function renderField(item, combineTitleOrg, path) {
            const isEdit = document.body.classList.contains('cv-edit-mode');
            // Hide field if it has a projects array and all projects are hidden in CV
            if (!isEdit && Array.isArray(item.projects) && item.projects.length > 0
                && item.projects.every(p => p && p.showOnCv === false)) {
                return '';
            }
            const title        = escapeHtml(item.title || '');
            const org          = escapeHtml(item.org || '');
            const rawDesc      = item.description || '';
            const descHtml     = Array.isArray(rawDesc)
                ? `<p class="cv3-field-desc" data-edit-path="${path}.description" data-edit-type="multiline-array">${rawDesc.map(escapeHtml).join('<br>')}</p>`
                : `<p class="cv3-field-desc" data-edit-path="${path}.description" data-edit-type="multiline">${escapeHtml(rawDesc)}</p>`;
            const rawDate      = item.date || '';
            const logoHtml     = renderLogo(item.logo);
            const projectsHtml = item.projects !== undefined ? renderProjects(item.projects || [], item.logo, path) : '';
            const titleInner = combineTitleOrg && org
                ? `<span data-edit-path="${path}.org">${org}</span> <span class="cv3-field-title-role">- <span data-edit-path="${path}.title">${title}</span></span>`
                : `<span data-edit-path="${path}.title">${title}</span>`;
            const orgLine      = !combineTitleOrg && org
                ? `<p class="cv3-field-org" data-edit-path="${path}.org">${org}</p>`
                : '';

            /* Split "Mar. 2023 - Jun. 2026" into start / end */
            const dateParts = rawDate.split(/\s*[-–—]\s*/);
            const dateStart = escapeHtml(dateParts[0] || rawDate);
            const dateEnd   = escapeHtml(dateParts[1] || '');
            const dateHtml  = `<div class="cv3-field-date" data-edit-path="${path}.date">${rawDate ? (dateStart + (dateEnd ? ` — ${dateEnd}` : '')) : ''}</div>`;

            return `<div class="cv3-field" data-edit-item="${path}">
                ${dateHtml}
                <div class="cv3-field-logo">${logoHtml || ''}<span class="cv3-edit-logo-path cv3-edit-only" data-edit-path="${path}.logo.src" data-edit-type="image-src">${escapeHtml((item.logo && item.logo.src) || '')}</span></div>
                <h3 class="cv3-field-title">${titleInner}</h3>
                ${orgLine}
                ${descHtml}
                ${projectsHtml}
            </div>`;
        }

        /* ===== DYNAMIC SECTION BUILDER ===== */
        function renderSectionHtml(section, num, data, sectionIndex) {
            const numStr  = String(num).padStart(2, '0');
            const iconSvg = SECTION_ICONS[section.icon] || SECTION_ICONS['summary'];
            const title   = escapeHtml(section.title || '');

            let contentHtml = '';
            if (section.type === 'summary') {
                contentHtml = `<div class="cv3-section-content"><p class="cv3-field-desc" data-edit-path="summary" data-edit-type="multiline">${escapeHtml(data.summary || '')}</p></div>`;
            } else if (section.type === 'fields') {
                const isEdit = document.body.classList.contains('cv-edit-mode');
                const items     = data[section.dataKey] || [];
                const renderedItems = items.map((item, i) => renderField(item, !!section.combineTitleOrg, `${section.dataKey}.${i}`));
                // If not editing, and section originally had items but all rendered empty, skip the whole section
                if (!isEdit && items.length > 0 && renderedItems.every(s => !s)) {
                    return '';
                }
                contentHtml = `<div class="cv3-fields" data-edit-list="${section.dataKey}">${renderedItems.join('')}</div>`;
            } else if (section.type === 'button') {
                const btn = section.button || {};
                const btnUrl   = escapeHtml(btn.url || '#');
                const btnPath  = `sections.${sectionIndex}.button`;
                return `<section class="cv3-section cv3-dynamic-section cv3-section-button-only" data-edit-item="sections.${sectionIndex}">
                    <a class="cv3-section-button" href="${btnUrl}" target="_blank" rel="noopener noreferrer" data-edit-path="sections.${sectionIndex}.title">${title}</a>
                    <div class="cv3-section-button-edit cv3-edit-only">
                        <span class="cv3-edit-link-url">URL: <span class="cv3-edit-inline" data-edit-path="${btnPath}.url" data-placeholder="https://example.com">${escapeHtml(btn.url || '')}</span></span>
                    </div>
                </section>`;
            }

            return `<section class="cv3-section cv3-dynamic-section" data-edit-item="sections.${sectionIndex}">
                <div class="cv3-strip">${iconSvg}<span class="cv3-strip-num">${numStr}</span></div>
                <div class="cv3-section-header" data-edit-path="sections.${sectionIndex}.title">${title}</div>
                ${contentHtml}
            </section>`;
        }

        /* ===== RENDER ===== */
        function renderCv3() {
            const data = window.CV_DATA;
            if (!data) return;

            /* Nav */
            const navLabel = document.getElementById('cv3NavLabel');
            if (navLabel && data.profile) {
                navLabel.innerHTML = `<span data-edit-path="profile.name">${escapeHtml(data.profile.name || '')}</span> <span style="opacity:0.5">/ CV-PORTFOLIO</span>`;
            }

            /* Hero */
            const heroName = document.getElementById('cv3HeroName');
            const heroRole = document.getElementById('cv3HeroRole');
            if (heroName) { heroName.textContent = data.profile?.name || ''; heroName.setAttribute('data-edit-path', 'profile.name'); }
            if (heroRole) { heroRole.textContent = data.profile?.role || ''; heroRole.setAttribute('data-edit-path', 'profile.role'); }

            /* Hero photo */
            const heroPhoto = document.getElementById('cv3HeroPhoto');
            if (heroPhoto && data.profile?.photo?.src) {
                heroPhoto.innerHTML = `<img src="${escapeHtml(data.profile.photo.src)}" alt="${escapeHtml(data.profile.photo.alt || '')}"><div class="cv3-hero-photo-fade"></div><span class="cv3-edit-photo-path cv3-edit-only" data-edit-path="profile.photo.src" data-edit-type="image-src">${escapeHtml(data.profile.photo.src)}</span>`;
            }

            /* Sidebar photo */
            const sidePhoto = document.getElementById('cv3Photo');
            if (sidePhoto && data.profile?.photo?.src) {
                sidePhoto.innerHTML = `<img src="${escapeHtml(data.profile.photo.src)}" alt="${escapeHtml(data.profile.photo.alt || '')}"><span class="cv3-edit-photo-path cv3-edit-only" data-edit-path="profile.photo.src" data-edit-type="image-src">${escapeHtml(data.profile.photo.src)}</span>`;
            }

            /* Dynamic sections (02+) from CV_DATA.sections — clear any previous render first */
            const mainEl = document.getElementById('cv3Main');
            if (mainEl && data.sections) {
                mainEl.querySelectorAll('.cv3-dynamic-section').forEach(n => n.remove());
                const hero = mainEl.querySelector('#cv3-hero');
                const sectionsHtml = data.sections
                    .map((section, i) => renderSectionHtml(section, i + 2, data, i))
                    .join('');
                if (hero) {
                    hero.insertAdjacentHTML('afterend', sectionsHtml);
                } else {
                    mainEl.insertAdjacentHTML('beforeend', sectionsHtml);
                }
            }

            /* Contact & Info — about array */
            const contactList = document.getElementById('cv3ContactList');
            if (contactList) {
                contactList.setAttribute('data-edit-list', 'about');
                contactList.innerHTML = (data.about || []).map((item, i) => {
                    const label     = escapeHtml(item.label || '');
                    const valueText = escapeHtml(item.value || '');
                    const iconHtml  = getAboutIcon(item.label || '');
                    const hrefText  = escapeHtml(item.href || '');
                    const valueHtml = item.href
                        ? `<a href="${escapeHtml(item.href)}"${item.target ? ` target="${escapeHtml(item.target)}" rel="noopener noreferrer"` : ''} data-edit-path="about.${i}.value">${valueText}</a>`
                        : `<span data-edit-path="about.${i}.value">${valueText}</span>`;
                    return `<li class="cv3-info-item" data-edit-item="about.${i}">
                        <div class="cv3-info-icon">${iconHtml}</div>
                        <div class="cv3-info-text">
                            <span class="cv3-info-label" data-edit-path="about.${i}.label">${label}</span>
                            <span class="cv3-info-value">${valueHtml}</span>
                            <span class="cv3-edit-href cv3-edit-only" data-edit-path="about.${i}.href" data-edit-type="href">${hrefText}</span>
                        </div>
                    </li>`;
                }).join('');
            }

            /* Skills */
            const skillsEl = document.getElementById('cv3SkillsList');
            if (skillsEl) {
                skillsEl.setAttribute('data-edit-list', 'skills');
                skillsEl.innerHTML = (data.skills || [])
                    .map((s, i) => `<a class="cv3-skill-tag" href="/cvprojects?tag=${encodeURIComponent(s)}" data-edit-item="skills.${i}"><span class="cv3-skill-tag-text" data-edit-path="skills.${i}">${escapeHtml(s)}</span></a>`)
                    .join('');
            }

            /* Notify editor (if loaded) so it can rebind controls */
            if (window.cvEditor && window.cvEditor.onRender) window.cvEditor.onRender();
        }
        window.renderCv3 = renderCv3;

        /* ===== POPUP ===== */
        let currentPopupEl = null;

        function openPopup(el) {
            currentPopupEl = el;
            document.getElementById('cv3PopupTitle').textContent = el.dataset.title || '';
            document.getElementById('cv3PopupDate').textContent  = el.dataset.date  || '';
            document.getElementById('cv3PopupDesc').textContent  = el.dataset.desc  || '';

            const imgEl = document.getElementById('cv3PopupImage');
            imgEl.innerHTML = el.dataset.img
                ? `<img src="${escapeHtml(el.dataset.img)}" alt="${escapeHtml(el.dataset.title || '')}">`
                : '<span class="cv3-popup-image-ph">IMAGE</span>';

            const logoEl = document.getElementById('cv3PopupOrgLogo');
            logoEl.innerHTML = el.dataset.orgLogo
                ? `<img src="${escapeHtml(el.dataset.orgLogo)}" alt="${escapeHtml(el.dataset.orgLogoAlt || '')}" style="max-width:140px;height:auto;">`
                : '';

            const linkEl = document.getElementById('cv3PopupLink');
            const linkUrl = (el.dataset.linkUrl || '').trim();
            const linkLabel = (el.dataset.linkLabel || '').trim();
            if (linkUrl) {
                linkEl.href = linkUrl;
                linkEl.textContent = linkLabel || 'Visit project';
                linkEl.style.display = '';
            } else {
                linkEl.removeAttribute('href');
                linkEl.textContent = '';
                linkEl.style.display = 'none';
            }

            document.getElementById('cv3PopupOverlay').classList.add('active');
        }

        function closePopup() {
            currentPopupEl = null;
            document.getElementById('cv3PopupOverlay').classList.remove('active');
        }

        function navigatePopup(dir) {
            if (!currentPopupEl) return;
            const all = Array.from(document.querySelectorAll('.cv3-project'));
            const idx = all.indexOf(currentPopupEl);
            if (idx === -1 || all.length < 2) return;
            const next = all[(idx + dir + all.length) % all.length];
            openPopup(next);
        }

        /* ===== INIT ===== */
        document.addEventListener('DOMContentLoaded', () => {
            renderCv3();

            /* Click delegation */
            document.addEventListener('click', e => {
                /* Skip project popup while editing */
                if (document.body.classList.contains('cv-edit-mode')) {
                    const overlay = document.getElementById('cv3PopupOverlay');
                    if (e.target === overlay || e.target.closest('#cv3PopupClose')) closePopup();
                    return;
                }
                const project = e.target.closest('.cv3-project');
                if (project) {
                    /* let the on-card link button navigate normally */
                    if (e.target.closest('.cv3-project-link-btn')) return;
                    openPopup(project);
                    return;
                }

                const overlay = document.getElementById('cv3PopupOverlay');
                if (e.target === overlay || e.target.closest('#cv3PopupClose')) closePopup();
            });

            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') { closePopup(); return; }
                const overlay = document.getElementById('cv3PopupOverlay');
                if (!overlay.classList.contains('active')) return;
                if (e.key === 'ArrowRight') { e.preventDefault(); navigatePopup(1); }
                else if (e.key === 'ArrowLeft') { e.preventDefault(); navigatePopup(-1); }
            });

            /* Keyboard shortcut for color configurator */
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
                    e.preventDefault();
                    toggleColorConfigurator();
                }
            });

            /* Hide configurator on init */
            setColorConfiguratorVisible(false);
            setTimeout(() => setColorConfiguratorVisible(false), 0);
            setTimeout(() => setColorConfiguratorVisible(false), 120);
        });

        /* ===== COLOR CONFIGURATOR HELPERS ===== */
        function setColorConfiguratorVisible(visible) {
            const menu = document.getElementById('colorConfigMenu');
            if (!menu) return;
            menu.classList.toggle('show', !!visible);
        }
        function toggleColorConfigurator() {
            const menu = document.getElementById('colorConfigMenu');
            if (!menu) return;
            menu.classList.toggle('show');
        }
    </script>
    <script src="../services/cvLayout.js"></script>
    <script src="../services/cvEditor.js"></script>
    <script src="../projects/StarCitizenTracker/color-config.js"></script>
    <script>
        /* Override Color Configurator reset defaults for CV3 */
        (function () {
            const CV3_DEFAULTS = { primary: '#e0dcd9', secondary: '#151312', accent: '#fbc25b' };
            function applyDefaults() {
                if (window.colorConfigMenu) {
                    window.colorConfigMenu.originalColors = CV3_DEFAULTS;
                }
            }
            if (window.colorConfigMenu) {
                applyDefaults();
            } else {
                document.addEventListener('DOMContentLoaded', applyDefaults);
            }
        })();
    </script>
</body>
</html>
