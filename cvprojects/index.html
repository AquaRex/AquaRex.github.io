<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — Thomas Hetland</title>
    <link rel="stylesheet" href="../projects/StarCitizenTracker/color-config.css">
    <link rel="stylesheet" href="../services/cvLayout.css">
    <link rel="stylesheet" href="../services/cvEditor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== COLOR SYSTEM (mirrors CV3) ===== */
        :root {
            --color-light:  #e0dcd9;
            --color-dark:   #151312;
            --accent-color: #fbc25b;

            --primary-color:   var(--color-light);
            --secondary-color: var(--color-dark);

            --bg:      var(--color-light);
            --surface: color-mix(in srgb, var(--color-light) 82%, white);
            --dark:    var(--color-dark);
            --text:    var(--color-dark);
            --muted:   color-mix(in srgb, var(--color-dark) 45%, var(--color-light));
            --border:  var(--color-dark);
            --strip-w: 52px;

            --sp-1:  4px;  --sp-2:  8px;  --sp-3: 12px;
            --sp-4: 16px;  --sp-5: 20px;  --sp-6: 24px;
            --sp-7: 32px;  --sp-8: 40px;
        }
        body.dark-mode {
            --primary-color:   var(--color-dark);
            --secondary-color: var(--color-light);
            --bg:      var(--color-dark);
            --surface: color-mix(in srgb, var(--color-dark) 82%, black);
            --dark:    var(--color-light);
            --text:    var(--color-light);
            --muted:   color-mix(in srgb, var(--color-light) 45%, var(--color-dark));
            --border:  var(--color-light);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        a { color: inherit; text-decoration: none; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: var(--sp-7);
        }

        /* ===== OUTER WRAPPER ===== */
        .cv3-outer {
            max-width: 1320px;
            margin: 0 auto;
            border: 2px solid var(--border);
            padding: var(--sp-7);
            display: flex;
            flex-direction: column;
            gap: var(--sp-7);
        }

        /* ===== NAV ===== */
        .cv3-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--sp-4) 0 var(--sp-6);
            height: 68px;
            border: 2px solid var(--border);
        }
        .cv3-nav-left {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .cv3-nav-right {
            display: flex;
            align-items: center;
            gap: var(--sp-5);
        }
        .cv3-nav-toggle {
            width: 36px; height: 36px;
            border: 2px solid var(--border);
            background: var(--dark);
            color: var(--bg);
            font-size: 0.85rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s;
        }
        .cv3-nav-toggle:hover { opacity: 0.7; }
        .cv3-nav-toggle.is-active {
            background: var(--bg);
            color: var(--dark);
        }
        /* Back button styled like a nav toggle (square) */
        .cv3-nav-back {
            width: 36px; height: 36px;
            border: 2px solid var(--border);
            background: transparent;
            color: var(--text);
            font-size: 0.9rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, color 0.15s;
        }
        .cv3-nav-back:hover {
            background: var(--dark);
            color: var(--bg);
        }

        /* ===== BODY: two-column ===== */
        .cv3-body {
            display: flex;
            align-items: flex-start;
        }

        /* ===== MAIN ===== */
        .cv3-main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: var(--sp-7);
        }

        /* ===== SECTION WRAPPER ===== */
        .cv3-section {
            display: grid;
            grid-template-columns: var(--strip-w) 1fr;
            border: 2px solid var(--border);
            position: relative;
        }
        .cv3-section::before {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 0;
            width: var(--strip-w);
            background: var(--dark);
            z-index: 0;
        }
        .cv3-section > *:not(.cv3-strip) {
            grid-column: 2;
        }

        /* ===== STRIP ===== */
        .cv3-strip {
            position: absolute;
            top: 0; bottom: 0; left: 0;
            width: var(--strip-w);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: var(--sp-3) 0;
            color: var(--bg);
            z-index: 1;
        }
        .cv3-strip svg { width: 16px; height: 16px; flex-shrink: 0; }
        .cv3-strip-num {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--bg);
        }

        /* ===== SECTION HEADER ===== */
        .cv3-section-header {
            display: flex;
            align-items: center;
            gap: var(--sp-3);
            padding: var(--sp-4) var(--sp-6);
            border-bottom: 2px solid var(--border);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .cv3-section-header svg { width: 15px; height: 15px; flex-shrink: 0; }

        /* ===== PROJECT CARDS ===== */
        .cvp-projects { padding: var(--sp-4) var(--sp-6); display: flex; flex-direction: column; gap: var(--sp-4); }
        .cvp-no-results {
            padding: var(--sp-6);
            font-size: 0.66rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--muted);
        }

        .cv3-project {
            display: flex;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        .cv3-project:hover, .cv3-project.is-hovered {
            background: var(--dark);
            color: var(--bg);
        }
        .cv3-project-thumb {
            width: 220px; height: 140px; flex-shrink: 0;
            border-right: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            background: color-mix(in srgb, var(--border) 5%, transparent);
        }
        .cv3-project-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .cv3-project-thumb-ph {
            font-size: 0.58rem; letter-spacing: 2px;
            font-weight: 700; color: var(--muted);
        }
        .cv3-project:hover .cv3-project-thumb,
        .cv3-project.is-hovered .cv3-project-thumb { border-right-color: var(--bg); }
        .cv3-project:hover .cv3-project-thumb-ph,
        .cv3-project.is-hovered .cv3-project-thumb-ph { color: var(--bg); }

        .cv3-project-info { flex: 1; padding: var(--sp-3) var(--sp-4); }
        .cv3-project-name {
            font-size: 0.84rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            margin-bottom: 0;
        }
        .cv3-project-date {
            font-size: 0.66rem; font-weight: 700;
            letter-spacing: 1.5px; color: var(--muted);
            margin-bottom: var(--sp-2); display: block;
        }
        .cv3-project-desc {
            font-size: 0.78rem; line-height: 1.6; color: var(--text);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .cv3-project:hover .cv3-project-name,
        .cv3-project:hover .cv3-project-date,
        .cv3-project:hover .cv3-project-desc,
        .cv3-project.is-hovered .cv3-project-name,
        .cv3-project.is-hovered .cv3-project-date,
        .cv3-project.is-hovered .cv3-project-desc { color: var(--bg); }

        /* project tags — horizontal top-right */
        .cv3-project-tags {
            display: flex; flex-direction: row;
            flex-wrap: wrap; gap: 4px; justify-content: flex-end;
        }
        .cv3-project-tag {
            font-size: 0.5rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            padding: 1px 5px;
            border: 1px solid var(--border);
            white-space: nowrap; color: var(--text);
            cursor: pointer; transition: background 0.1s;
        }
        .cv3-project-tag.is-active-filter {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: var(--dark);
        }
        .cv3-project:hover .cv3-project-tag,
        .cv3-project.is-hovered .cv3-project-tag { border-color: var(--bg); color: var(--bg); }
        .cv3-project:hover .cv3-project-tag.is-active-filter,
        .cv3-project.is-hovered .cv3-project-tag.is-active-filter {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: var(--dark);
        }

        /* hidden when filtered out */
        .cv3-project.is-hidden { display: none; }

        /* ===== SIDEBAR ===== */
        .cv3-sidebar {
            width: 330px;
            flex-shrink: 0;
            align-self: flex-start;
            display: flex;
            flex-direction: column;
            gap: var(--sp-7);
            padding-left: var(--sp-7);
        }
        .cv3-sidebar-card { border: 2px solid var(--border); }
        .cv3-sidebar-card-header {
            display: grid;
            grid-template-columns: var(--strip-w) 1fr;
            align-items: center;
            border-bottom: 2px solid var(--border);
            font-size: 0.66rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 0;
        }
        .cv3-sidebar-card-header > svg {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: var(--sp-4);
            background: var(--dark);
            color: var(--bg);
            align-self: stretch;
            justify-self: start;
            display: block;
        }
        .cv3-sidebar-card-header-text {
            padding: var(--sp-4) var(--sp-4) var(--sp-4) var(--sp-6);
        }
        .cv3-sidebar-card-body { padding: var(--sp-6); }

        /* Filter tags in sidebar */
        .cvp-filter-tags {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .cvp-filter-tag {
            font-size: 0.62rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 8px 14px;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            background: transparent; color: var(--text);
            text-align: left;
        }
        .cvp-filter-tag:hover { background: color-mix(in srgb, var(--dark) 10%, transparent); }
        .cvp-filter-tag.is-active {
            background: var(--dark);
            color: var(--bg);
        }
        .cvp-filter-clear {
            font-size: 0.58rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 6px 14px;
            border: 2px solid var(--accent-color);
            cursor: pointer;
            background: transparent;
            color: var(--accent-color);
            transition: background 0.15s, color 0.15s;
            display: none;
        }
        .cvp-filter-clear.visible { display: block; }
        .cvp-filter-clear:hover { background: var(--accent-color); color: var(--dark); }

        /* ===== POPUP ===== */
        .cv3-popup-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: flex-start; justify-content: center;
            overflow-y: auto;
            padding: var(--sp-8) var(--sp-5);
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s;
        }
        .cv3-popup-overlay.active { opacity: 1; pointer-events: auto; }
        .cv3-popup {
            background: var(--surface);
            border: 2px solid var(--border);
            max-width: 1500px; width: 100%;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.25s;
            margin: auto;
        }
        .cv3-popup-overlay.active .cv3-popup { transform: translateY(0); }
        .cv3-popup-close {
            position: absolute; top: var(--sp-3); right: var(--sp-3);
            width: 32px; height: 32px;
            border: 2px solid var(--border);
            background: var(--dark); color: var(--bg);
            font-size: 0.8rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            z-index: 2; transition: opacity 0.2s;
        }
        .cv3-popup-close:hover,
        .cv3-popup-close.is-hovered { opacity: 0.7; }
        .cv3-popup-content { display: flex; }
        .cv3-popup-image {
            flex: 0 0 auto;
            width: auto;
            height: 600px;
            aspect-ratio: 16 / 9;
            border-right: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            background: color-mix(in srgb, var(--border) 5%, transparent);
            overflow: hidden;
        }
        .cv3-popup-image img { width: 100%; height: 100%; object-fit: contain; }
        .cv3-popup-image-ph {
            font-size: 0.62rem; letter-spacing: 2px;
            font-weight: 700; color: var(--muted);
        }
        .cv3-popup-details { flex: 1; padding: var(--sp-7); }
        .cv3-popup-org-logo { max-width: 140px; margin-bottom: var(--sp-4); }
        .cv3-popup-org-logo img { width: 100%; height: auto; }
        .cv3-popup-title {
            font-size: 1.3rem; font-weight: 900;
            letter-spacing: 0.5px; margin-bottom: 4px;
        }
        .cv3-popup-date {
            font-size: 0.68rem; font-weight: 700;
            letter-spacing: 2px; color: var(--muted);
            text-transform: uppercase;
            display: block; margin-bottom: var(--sp-4);
        }
        .cv3-popup-desc { font-size: 0.87rem; line-height: 1.8; color: var(--text); }
        .cv3-popup-link-btn {
            display: inline-block;
            margin-top: var(--sp-5);
            padding: var(--sp-3) var(--sp-5);
            background: var(--dark);
            color: var(--bg);
            border: 2px solid var(--border);
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-decoration: none;
            transition: opacity 0.2s, background 0.2s;
        }
        .cv3-popup-link-btn:hover,
        .cv3-popup-link-btn.is-hovered {
            background: var(--accent-color, var(--dark));
            color: var(--dark);
        }
        .cv3-project-link-btn {
            position: absolute;
            right: var(--sp-3);
            bottom: var(--sp-3);
            padding: 6px 12px;
            background: var(--dark);
            color: var(--bg);
            border: 2px solid var(--border);
            font-size: 0.62rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
            z-index: 2;
        }
        .cv3-project-link-btn:hover,
        .cv3-project-link-btn.is-hovered {
            background: var(--accent-color, var(--dark));
            color: var(--dark);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 820px) {
            .cv3-body { flex-direction: column; }
            .cv3-sidebar { width: 100%; padding-left: 0; padding-top: var(--sp-6); }
        }
        @media (max-width: 560px) {
            body { padding: var(--sp-4); }
            .cv3-outer { padding: var(--sp-4); gap: var(--sp-4); }
            .cv3-popup-content { flex-direction: column; }
            .cv3-popup-image { flex: none; min-height: 260px; border-right: none; border-bottom: 2px solid var(--border); }
        }
    </style>
</head>
<body>

    <div id="cv3NavShadowLayer" aria-hidden="true"></div>
    <div id="cv3ShadowLayer" aria-hidden="true"></div>
    <div id="cv3RenderRoot">

    <!-- POPUP -->
    <div class="cv3-popup-overlay" id="cvpPopupOverlay">
        <div class="cv3-popup">
            <button class="cv3-popup-close" id="cvpPopupClose" aria-label="Close"><i class="fas fa-times"></i></button>
            <div class="cv3-popup-content">
                <div class="cv3-popup-image" id="cvpPopupImage">
                    <span class="cv3-popup-image-ph">IMAGE</span>
                </div>
                <div class="cv3-popup-details">
                    <div class="cv3-popup-org-logo" id="cvpPopupOrgLogo"></div>
                    <h3 class="cv3-popup-title" id="cvpPopupTitle"></h3>
                    <span class="cv3-popup-date" id="cvpPopupDate"></span>
                    <p class="cv3-popup-desc" id="cvpPopupDesc"></p>
                    <a class="cv3-popup-link-btn" id="cvpPopupLink" target="_blank" rel="noopener noreferrer" style="display:none"></a>
                </div>
            </div>
        </div>
    </div>

    <!-- PAGE -->
    <div class="cv3-outer">

        <!-- NAV -->
        <nav class="cv3-nav">
            <div class="cv3-nav-left">THOMAS HETLAND <span style="opacity:0.5">/ PROJECTS</span></div>
            <div class="cv3-nav-right">
                <a href="/cv" class="cv3-nav-back" title="Back to CV" aria-label="Back to CV">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                </a>
                <button class="cv3-nav-toggle is-active" id="cv3GlassToggle" title="Show Shadow Layer" aria-label="Toggle shadow layer" aria-pressed="false">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <circle cx="8.2" cy="11.0" r="3.6" opacity="0.95"></circle>
                        <circle cx="14.9" cy="8.2" r="2.4" opacity="0.75"></circle>
                        <circle cx="14.8" cy="15.2" r="3.2" opacity="0.85"></circle>
                    </svg>
                </button>
                <button class="cv3-nav-toggle" id="cv3DarkToggle" aria-label="Toggle dark mode">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                </button>
            </div>
        </nav>

        <!-- BODY -->
        <div class="cv3-body">

            <!-- MAIN -->
            <main class="cv3-main" id="cvpMain"></main>

            <!-- SIDEBAR -->
            <aside class="cv3-sidebar">
                <div class="cv3-sidebar-card">
                    <div class="cv3-sidebar-card-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true">
                            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>

                        <span class="cv3-sidebar-card-header-text">FILTER BY TAG</span>
                    </div>
                    <div class="cv3-sidebar-card-body">
                        <div class="cvp-filter-tags" id="cvpFilterTags"></div>
                        <button class="cvp-filter-clear" id="cvpFilterClear" style="margin-top:12px;">Clear Filter</button>
                    </div>

        </div><!-- /cv3-body -->

    <script src="../cv/cv.js"></script>
    <script src="../services/cvLayout.js"></script>
    <script src="../services/cvEditor.js"></script>
    <script src="../projects/StarCitizenTracker/color-config.js"></script>
    <script>
        (function () {
            /* ===== HELPERS ===== */
            function esc(v) {
                return String(v ?? '')
                    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
                    .replace(/'/g,'&#39;');
            }
            const _SI = (body) => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true">${body}</svg>`;
            const ICONS = {
                projects:   _SI('<polyline points="16,18 22,12 16,6"/><polyline points="8,6 2,12 8,18"/>'),
                experience: _SI('<rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>'),
            };

            /* ===== COLLECT GROUPS ===== */
            const data   = window.CV_DATA || {};
            const groups = [];

            (data.experience || []).forEach((exp, i) => {
                if ((exp.projects || []).length) {
                    groups.push({
                        title:    exp.org || exp.title || 'Experience',
                        icon:     'experience',
                        logo:     exp.logo || null,
                        projects: exp.projects,
                        path:     `experience.${i}`,
                    });
                }
            });
            (data.projects || []).forEach((group, i) => {
                if ((group.projects || []).length) {
                    groups.push({
                        title:    group.title || 'Projects',
                        icon:     'projects',
                        logo:     null,
                        projects: group.projects,
                        path:     `projects.${i}`,
                    });
                }
            });

            /* ===== COLLECT ALL TAGS ===== */
            const allProjects = groups.flatMap(g => g.projects);
            const allTags = [...new Set(allProjects.flatMap(p => p.tags || []))].sort();

            /* ===== STATE ===== */
            const _initialParams = new URLSearchParams(location.search);
            const _initialRaw = (_initialParams.get('tags') || _initialParams.get('tag') || '')
                .split(',').map(s => s.trim()).filter(Boolean);
            // Set of lowercased active tag strings
            const activeTags = new Set(_initialRaw.map(s => s.toLowerCase()));

            /* ===== RENDER SECTIONS ===== */
            // Re-derive groups from CV_DATA on each render so editor changes appear.
            function deriveGroups() {
                const d = window.CV_DATA || {};
                const out = [];
                (d.experience || []).forEach((exp, i) => {
                    if ((exp.projects || []).length) {
                        out.push({
                            title:    exp.org || exp.title || 'Experience',
                            icon:     'experience',
                            logo:     exp.logo || null,
                            projects: exp.projects,
                            path:     `experience.${i}`,
                        });
                    }
                });
                (d.projects || []).forEach((group, i) => {
                    if ((group.projects || []).length) {
                        out.push({
                            title:    group.title || 'Projects',
                            icon:     'projects',
                            logo:     null,
                            projects: group.projects,
                            path:     `projects.${i}`,
                        });
                    }
                });
                return out;
            }

            function renderSections() {
                const isEdit = document.body.classList.contains('cv-edit-mode');
                const liveGroups = deriveGroups();
                const main = document.getElementById('cvpMain');
                main.innerHTML = liveGroups.map((group, i) => {
                    const num  = String(i + 1).padStart(2, '0');
                    const icon = ICONS[group.icon] || ICONS.projects;

                    const cardsHtml = (group.projects || []).map((p, pi) => {
                        const basePath = `${group.path}.projects.${pi}`;
                        const showOnCv = p.showOnCv !== false;
                        const name     = esc(p.name || '');
                        const date     = esc(p.date || '');
                        const summary  = esc(p.summary || '');
                        const popupDesc = esc(p.popupDescription || p.summary || '');
                        const img      = esc(p.image || '');
                        const linkLabel = esc((p.link && p.link.label) || '');
                        const linkUrl   = esc((p.link && p.link.url) || '');
                        const showOnCard = !!(p.link && p.link.showOnCard);
                        const logoSrc  = esc((group.logo && group.logo.src) || '');
                        const logoAlt  = esc((group.logo && group.logo.alt) || '');
                        const tags     = p.tags || [];
                        const tagsHtml = `<div class="cv3-project-tags" data-edit-list="${basePath}.tags">${tags.map((t, ti) =>
                                `<span class="cv3-project-tag${activeTags.has((t||'').toLowerCase()) ? ' is-active-filter' : ''}" data-tag="${esc(t)}" data-edit-item="${basePath}.tags.${ti}"><span class="cv3-project-tag-text" data-edit-path="${basePath}.tags.${ti}">${esc(t)}</span></span>`
                              ).join('')}</div>`;
                        const cardBtnHtml = (showOnCard && linkUrl)
                            ? `<a class="cv3-project-link-btn" href="${linkUrl}" target="_blank" rel="noopener noreferrer">${linkLabel || 'Visit project'}</a>`
                            : '';
                        const hiddenClass = showOnCv ? '' : ' cv3-project-cv-hidden';
                        return `<div class="cv3-project${hiddenClass}"
                                    data-edit-item="${basePath}"
                                    data-title="${name}" data-date="${date}"
                                    data-desc="${popupDesc}" data-img="${img}"
                                    data-tags='${JSON.stringify(tags)}'
                                    data-org-logo="${logoSrc}" data-org-logo-alt="${logoAlt}"
                                    data-link-label="${linkLabel}" data-link-url="${linkUrl}">
                            <div class="cv3-project-thumb">
                                ${img ? `<img src="${img}" alt="${name}">` : '<span class="cv3-project-thumb-ph">IMG</span>'}
                                <span class="cv3-edit-thumb-path cv3-edit-only" data-edit-path="${basePath}.image" data-edit-type="image-src">${img || 'image path…'}</span>
                            </div>
                            <div class="cv3-project-info">
                                <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;">
                                    <h4 class="cv3-project-name" data-edit-path="${basePath}.name">${name}</h4>
                                    ${tagsHtml}
                                </div>
                                <span class="cv3-project-date" data-edit-path="${basePath}.date">${date}</span>
                                <p class="cv3-project-desc" data-edit-path="${basePath}.summary">${summary}</p>
                                <p class="cv3-project-popupdesc cv3-edit-only" data-edit-path="${basePath}.popupDescription" data-edit-type="multiline">${popupDesc}</p>
                                ${cardBtnHtml}
                                <div class="cv3-project-link-edit cv3-edit-only">
                                    <span class="cv3-edit-link-toggle">Show in CV:
                                        <span class="cv3-edit-bool ${showOnCv ? 'is-on' : 'is-off'}" data-edit-path="${basePath}.showOnCv" data-edit-type="bool">${showOnCv ? 'YES' : 'NO'}</span>
                                    </span>
                                    <span class="cv3-edit-link-label">Button label: <span data-edit-path="${basePath}.link.label">${linkLabel}</span></span>
                                    <span class="cv3-edit-link-url">URL: <span data-edit-path="${basePath}.link.url">${linkUrl}</span></span>
                                    <span class="cv3-edit-link-toggle">Show on card:
                                        <span class="cv3-edit-bool ${showOnCard ? 'is-on' : 'is-off'}" data-edit-path="${basePath}.link.showOnCard" data-edit-type="bool">${showOnCard ? 'YES' : 'NO'}</span>
                                    </span>
                                </div>
                            </div>
                        </div>`;
                    }).join('');

                    const noResults = `<p class="cvp-no-results">No projects match this filter</p>`;

                    return `<section class="cv3-section" data-group="${i}">
                        <div class="cv3-strip">
                            ${icon}
                            <span class="cv3-strip-num">${num}</span>
                        </div>
                        <div class="cv3-section-header">${icon} ${esc(group.title)}</div>
                        <div class="cvp-projects" id="cvpGroup${i}" data-edit-list="${group.path}.projects">
                            ${cardsHtml}
                            <p class="cvp-no-results" style="display:none;">No projects match this filter</p>
                        </div>
                    </section>`;
                }).join('');
            }

            /* ===== RENDER SIDEBAR FILTERS ===== */
            function renderFilters() {
                const el = document.getElementById('cvpFilterTags');
                el.innerHTML = allTags.map(t =>
                    `<button class="cvp-filter-tag${activeTags.has((t||'').toLowerCase()) ? ' is-active' : ''}" data-tag="${esc(t)}">${esc(t)}</button>`
                ).join('');
                document.getElementById('cvpFilterClear').classList.toggle('visible', activeTags.size > 0);
            }

            /* ===== APPLY FILTER ===== */
            function tagEq(a, b) {
                return (a || '').toLowerCase() === (b || '').toLowerCase();
            }

            function toggleActiveTag(tag) {
                const k = (tag || '').toLowerCase();
                if (!k) return;
                if (activeTags.has(k)) activeTags.delete(k);
                else activeTags.add(k);
            }

            function applyFilter() {
                const hasFilter = activeTags.size > 0;
                document.querySelectorAll('.cv3-project').forEach(card => {
                    const tags = JSON.parse(card.dataset.tags || '[]').map(t => (t||'').toLowerCase());
                    // OR match: project shown if any of its tags is active
                    const match = !hasFilter || tags.some(t => activeTags.has(t));
                    card.classList.toggle('is-hidden', !match);
                });
                document.querySelectorAll('.cv3-project-tag').forEach(el => {
                    el.classList.toggle('is-active-filter', activeTags.has((el.dataset.tag||'').toLowerCase()));
                });
                document.querySelectorAll('.cvp-filter-tag').forEach(el => {
                    el.classList.toggle('is-active', activeTags.has((el.dataset.tag||'').toLowerCase()));
                });

                /* show/hide per-section no-results message */
                document.querySelectorAll('.cvp-projects').forEach(group => {
                    const visible = [...group.querySelectorAll('.cv3-project')].some(c => !c.classList.contains('is-hidden'));
                    group.querySelector('.cvp-no-results').style.display = visible ? 'none' : 'block';
                });

                document.getElementById('cvpFilterClear').classList.toggle('visible', hasFilter);

                const url = new URL(location.href);
                url.searchParams.delete('tag');
                if (hasFilter) url.searchParams.set('tags', [...activeTags].join(','));
                else url.searchParams.delete('tags');
                history.replaceState(null, '', url);
            }

            /* ===== POPUP ===== */
            let currentPopupEl = null;

            function openPopup(el) {
                currentPopupEl = el;
                document.getElementById('cvpPopupTitle').textContent = el.dataset.title || '';
                document.getElementById('cvpPopupDate').textContent  = el.dataset.date  || '';
                document.getElementById('cvpPopupDesc').textContent  = el.dataset.desc  || '';
                const imgEl = document.getElementById('cvpPopupImage');
                imgEl.innerHTML = el.dataset.img
                    ? `<img src="${esc(el.dataset.img)}" alt="${esc(el.dataset.title||'')}">`
                    : '<span class="cv3-popup-image-ph">IMAGE</span>';
                const logoEl = document.getElementById('cvpPopupOrgLogo');
                logoEl.innerHTML = el.dataset.orgLogo
                    ? `<img src="${esc(el.dataset.orgLogo)}" alt="${esc(el.dataset.orgLogoAlt||'')}" style="max-width:140px;height:auto;">`
                    : '';
                const linkEl = document.getElementById('cvpPopupLink');
                const linkUrl = (el.dataset.linkUrl || '').trim();
                const linkLabel = (el.dataset.linkLabel || '').trim();
                if (linkUrl) {
                    linkEl.href = linkUrl;
                    linkEl.textContent = linkLabel || 'Visit project';
                    linkEl.style.display = '';
                } else {
                    linkEl.removeAttribute('href');
                    linkEl.textContent = '';
                    linkEl.style.display = 'none';
                }
                document.getElementById('cvpPopupOverlay').classList.add('active');
            }

            function closePopup() {
                currentPopupEl = null;
                document.getElementById('cvpPopupOverlay').classList.remove('active');
            }

            function navigatePopup(dir) {
                if (!currentPopupEl) return;
                /* Only navigate among visible (filtered) projects */
                const all = Array.from(document.querySelectorAll('.cv3-project'))
                    .filter(p => p.offsetParent !== null);
                const idx = all.indexOf(currentPopupEl);
                if (idx === -1 || all.length < 2) return;
                const next = all[(idx + dir + all.length) % all.length];
                openPopup(next);
            }

            /* ===== EVENTS ===== */
            document.addEventListener('click', e => {
                const inEdit = document.body.classList.contains('cv-edit-mode');
                /* filter tag on a card (skip in edit mode so tags become editable) */
                const cardTag = e.target.closest('.cv3-project-tag');
                if (cardTag && !inEdit) {
                    e.stopPropagation();
                    toggleActiveTag(cardTag.dataset.tag);
                    applyFilter(); renderFilters(); return;
                }
                /* open project popup (skip in edit mode) */
                const project = e.target.closest('.cv3-project');
                if (project && !inEdit) {
                    if (e.target.closest('.cv3-project-link-btn')) return;
                    openPopup(project);
                    return;
                }

                /* sidebar filter button */
                const filterBtn = e.target.closest('.cvp-filter-tag');
                if (filterBtn) {
                    toggleActiveTag(filterBtn.dataset.tag);
                    applyFilter(); renderFilters(); return;
                }
                /* clear button */
                if (e.target.closest('#cvpFilterClear')) {
                    activeTags.clear(); applyFilter(); renderFilters(); return;
                }
                /* close popup */
                const overlay = document.getElementById('cvpPopupOverlay');
                if (e.target === overlay || e.target.closest('#cvpPopupClose')) {
                    closePopup();
                }
            });

            document.addEventListener('keydown', e => {
                const overlay = document.getElementById('cvpPopupOverlay');
                if (!overlay.classList.contains('active')) return;
                if (e.key === 'Escape') { closePopup(); }
                else if (e.key === 'ArrowRight') { e.preventDefault(); navigatePopup(1); }
                else if (e.key === 'ArrowLeft')  { e.preventDefault(); navigatePopup(-1); }
            });

            /* ===== DARK MODE & SHADOW LAYER are handled by services/cvLayout.js ===== */

            /* ===== INIT ===== */
            // Re-derive tag set from live data so editor changes are reflected
            function refreshAllTags() {
                const liveProjects = deriveGroups().flatMap(g => g.projects);
                allTags.length = 0;
                [...new Set(liveProjects.flatMap(p => p.tags || []))].sort()
                    .forEach(t => allTags.push(t));
            }

            // Public re-render hook used by cvEditor after edits
            window.renderCv3 = function () {
                refreshAllTags();
                renderSections();
                renderFilters();
                applyFilter();
                if (window.cvEditor && window.cvEditor.onRender) window.cvEditor.onRender();
            };

            renderSections();
            renderFilters();
            applyFilter();

            /* ===== CV3 DEFAULTS for color configurator ===== */
            (function () {
                const DEFAULTS = { primary: '#e0dcd9', secondary: '#151312', accent: '#fbc25b' };
                function applyDefaults() {
                    if (window.colorConfigMenu) window.colorConfigMenu.originalColors = DEFAULTS;
                }
                function hideMenu() {
                    const menu = document.getElementById('colorConfigMenu');
                    if (menu) menu.classList.remove('show');
                }
                if (window.colorConfigMenu) applyDefaults();
                else document.addEventListener('DOMContentLoaded', applyDefaults);
                hideMenu();
                setTimeout(hideMenu, 0);
                setTimeout(hideMenu, 120);
            })();
        })();
    </script>
</body>
</html>
